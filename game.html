    <div class="overlay">
      <div class="modal">
        <h2>慘劇 Tragedy — 劇本設定</h2>
        <p>下方為預設劇本。可直接「開始遊戲」或修改後再開始。</p>
        <textarea id="scriptInput">${SCRIPT_DEFAULT_TEXT}</textarea>
        <div id="setupErr" style="color:#ff8888; font-size:12px; margin-top:6px;"></div>
        <div class="modal-actions">
          <button class="cancel" onclick="document.getElementById('scriptInput').value = ${JSON.stringify(SCRIPT_DEFAULT_TEXT).replace(/"/g, '&quot;')}">還原預設</button>
          <button class="confirm" onclick="startGame()">開始遊戲</button>
        </div>
      </div>
    </div>`;
}

function renderSetup() {
  return renderOldSetup();
}

function renderHeader() {
  let role = '';
  if (state.phase === 'mastermind') role = `<span class="role-banner mastermind">劇作家回合</span>`;
  else if (state.phase === 'player')     role = `<span class="role-banner player">玩家回合</span>`;
  else if (state.phase === 'resolve')    role = `<span class="role-banner resolve">出牌結算</span>`;
  else if (state.phase === 'event')      role = `<span class="role-banner event">事件結算</span>`;
  else if (state.phase === 'loopEnd')    role = `<span class="role-banner ${state.loopResult==='win'?'resolve':'mastermind'}">輪 ${state.loop} 結束</span>`;
  else if (state.phase === 'gameover')   role = `<span class="role-banner resolve">遊戲結束</span>`;
  const titleSuffix = state.script && state.script.name ? `　【${state.script.name}】` : '';
  return `
    <header>
      <h1>慘劇 Tragedy${titleSuffix}</h1>
      <div class="day-info">第 ${state.day} 天 / ${state.script.daysPerLoop} 天　·　第 ${state.loop} 輪 / ${state.script.loops} 輪　·　ex 槽 ${state.ex || 0}</div>
      ${role}
    </header>`;
}

function renderRuleBanner() {
  if (!state.script || !state.script.Y1) return '';
  const isMaster = state.phase === 'mastermind';
  const isOver = state.phase === 'gameover';
  const revealed = state.revealedXRules || {};
  const items = [];
  const revealedY = state.revealedYRules || {};
  // Y1 — 預設對玩家隱藏（劇作家可見，遊戲結束公開，被公開時可見）
  items.push({ label: 'Y1', value: state.script.Y1, visible: isMaster || isOver || revealedY.Y1 });
  // Y2 — 劇作家可見，或當瘋狂的真相啟動且當前 ex≥2 時公開
  if (state.script.Y2) {
    const isMadTruthOn = (state.script.X1 === '瘋狂的真相' || state.script.X2 === '瘋狂的真相') && state.ex >= 2;
    items.push({ label: 'Y2', value: state.script.Y2, visible: isMaster || isOver || revealedY.Y2 || isMadTruthOn });
  }
  // X1 — 劇作家可見，或 ex≥2，或被情報商公開
  items.push({ label: 'X1', value: state.script.X1, visible: isMaster || isOver || state.ex >= 2 || revealed.X1 });
  // X2 — 劇作家可見，或被情報商公開
  items.push({ label: 'X2', value: state.script.X2, visible: isMaster || isOver || revealed.X2 });

  let html = '<div class="calendar" style="background:#2a2a48;">';
  for (const it of items) {
    const txt = it.visible ? `${it.label}：${it.value}` : `${it.label}：？`;
    html += `<div class="cal-day" style="text-align:center; flex:1;">
      <div class="ev-name" style="color:${it.visible?'#f0c674':'#888'}; font-weight:bold;">${txt}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderCalendar() {
  const showCulprit = (state.phase === 'mastermind'); // 劇作家階段顯示
  const revealed = state.revealedEventTargets || {};
  let html = '<div class="calendar">';
  for (let d = 1; d <= state.script.daysPerLoop; d++) {
    const ev = state.script.events.find(e => e.day === d);
    const cur = d === state.day ? ' current' : '';
    html += `<div class="cal-day${cur}"><div class="day-num">第 ${d} 天</div>`;
    if (ev) {
      html += `<div class="ev-name">${ev.event}</div>`;
      if (showCulprit) {
        html += `<div class="ev-target">當事人：${ev.target}</div>`;
      } else if (revealed[d]) {
        html += `<div class="ev-target">當事人：${revealed[d]} (已公開)</div>`;
      }
    } else {
      html += `<div style="color:#666;">—</div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

// 取得某目標應該顯示的籌碼
function getDisplayChipsAt(target) {
  const out = [];
  if (state.phase === 'mastermind') {
    state.mPlays.forEach(p => {
      if (targetEqual(p.target, target)) {
        out.push({ side:'m', name: getCard('m', p.cardId).name, removable: true });
      }
    });
  } else if (state.phase === 'player') {
    state.pPlays.forEach(p => {
      if (targetEqual(p.target, target)) {
        out.push({ side:'p', name: getCard('p', p.cardId).name, removable: true });
      }
    });
    state.mPlays.forEach(p => {
      if (targetEqual(p.target, target)) {
        out.push({ side:'m', name: '劇作家 ?', hidden: true });
      }
    });
  } else if (state.phase === 'resolve' || state.phase === 'event') {
    const log = state.log.find(l => l.kind === 'cards' && l.day === state.day);
    if (log) {
      const group = log.groups.find(g => targetEqual(g.target, target));
      if (group) {
        group.plays.forEach((p, idx) => {
          out.push({
            side: p.side,
            name: p.card.name + (p.side==='m' ? '（劇）' : '（玩）'),
            cancelled: group.cancelled.includes(idx),
          });
        });
      }
    }
  }
  return out;
}

function isSelectableTarget(target) {
  if (!state.selectedCard) return false;
  if (state.phase !== 'mastermind' && state.phase !== 'player') return false;
  const plays = state.phase === 'mastermind' ? state.mPlays : state.pPlays;
  if (plays.length >= 3) return false;
  if (plays.some(p => targetEqual(p.target, target))) return false;
  // 死亡或尚未登場的角色不可被選
  if (target.type === 'char') {
    const c = state.characters.find(c => c.id === target.id);
    if (c && (c.dead || c.offBoard)) return false;
  }
  return true;
}

function renderMap() {
  // 第二象限 / 第一象限
  // 第三象限 / 第四象限
  const order = [2, 1, 3, 4];
  let html = '<div class="map">';
  for (const q of order) html += renderLocation(q);
  html += '</div>';
  return html;
}

function renderLocation(qid) {
  const loc = state.locations.find(l => l.id === qid);
  const target = { type: 'loc', id: qid };
  const sel = isSelectableTarget(target);

  let chips = '';
  for (const ch of getDisplayChipsAt(target)) {
    const sideCls = ch.side === 'm' ? 'mastermind' : 'player';
    const extra = (ch.hidden?' hidden':'') + (ch.cancelled?' cancelled':'') + (ch.removable?' removable':'');
    const click = ch.removable ? `onclick="event.stopPropagation(); removePlayByTarget('loc', ${qid})"` : '';
    const suffix = ch.removable ? ' ✕' : '';
    chips += `<span class="chip ${sideCls}${extra}" ${click}>${ch.name}${suffix}</span>`;
  }

  let html = `<div class="location loc-${qid}${sel?' selectable':''}" onclick="onClickTarget('loc', ${qid})">
    <div class="location-header">
      <span class="location-name">${loc.name}</span>
      ${showPrivateStats() ? `<span class="conspiracy">密謀 ${loc.conspiracy}</span>` : ''}
    </div>
    <div class="chip-row">${chips}</div>
    <div class="character-list">`;

  // 顯示在場上的（活著或死亡）；尚未登場（offBoard）的不顯示
  const here = state.characters.filter(c => c.position === qid && !c.offBoard);
  for (const c of here) {
    const ctarget = { type: 'char', id: c.id };
    const csel = isSelectableTarget(ctarget);
    const overAnx = !c.dead && c.anxiety >= c.anxietyLimit && showPrivateStats() ? ' over-anxiety' : '';
    const dead = c.dead ? ' dead' : '';
    let ccChips = '';
    if (!c.dead) {
      for (const ch of getDisplayChipsAt(ctarget)) {
        const sideCls = ch.side === 'm' ? 'mastermind' : 'player';
        const extra = (ch.hidden?' hidden':'') + (ch.cancelled?' cancelled':'') + (ch.removable?' removable':'');
        const click = ch.removable ? `onclick="event.stopPropagation(); removePlayByTarget('char', ${c.id})"` : '';
        const suffix = ch.removable ? ' ✕' : '';
        ccChips += `<span class="chip ${sideCls}${extra}" ${click}>${ch.name}${suffix}</span>`;
      }
    }
    html += `<div class="character${csel?' selectable':''}${overAnx}${dead}"
      onclick="event.stopPropagation(); ${c.dead?'':'onClickTarget'}('char', ${c.id})">
      <div class="char-row">
        <span class="char-name">${c.name}</span>
        <span class="char-stats">
          ${c.dead ? '已死亡' : `
            ${showPrivateStats() ? `<span class="stat-anxiety">不安 ${c.anxiety}/${c.anxietyLimit}</span>` : ''}
            <span class="stat-friendly">友好 ${c.friendly}</span>
            ${showPrivateStats() && c.conspiracy>0 ? `<span class="stat-cons">密 ${c.conspiracy}</span>` : ''}
          `}
        </span>
      </div>
      ${ccChips ? `<div class="char-chips">${ccChips}</div>` : ''}
    </div>`;
  }
  html += '</div></div>';
  return html;
}

function renderSidePanel() {
  let html = '<div class="side-panel">';
  // 劇作家機密面板（只在劇作家階段）
  if (state.phase === 'mastermind') {
    html += renderSecretPanel();
  }
  html += renderAnnouncementPanel();
  if (state.phase === 'mastermind' || state.phase === 'player') {
    html += renderCardPanel();
    html += renderPlaysPanel();
  } else if (state.phase === 'resolve') {
    html += `<div class="panel resolve-flex"><h3>第 ${state.day} 天 出牌結算</h3>
      <div class="resolve-area">${renderResolveDetails()}</div>
      <button class="primary" onclick="startMasterAbilityPhase()">→ 劇作家任意能力</button>
    </div>`;
  } else if (state.phase === 'masterAbility') {
    html += `<div class="panel resolve-flex"><h3>第 ${state.day} 天 劇作家任意能力</h3>
      <div class="resolve-area">${renderMasterAbilityDetails()}</div>
      ${state.pendingChoice ? '' : '<button class="primary" onclick="endMasterAbilityPhase()">→ 友好階段</button>'}
    </div>`;
  } else if (state.phase === 'friendly') {
    html += `<div class="panel resolve-flex"><h3>第 ${state.day} 天 友好能力階段</h3>
      <div class="resolve-area">${renderFriendlyDetails()}</div>
      ${state.pendingChoice ? '' : '<button class="primary" onclick="endFriendlyPhase()">→ 事件結算</button>'}
    </div>`;
  } else if (state.phase === 'event') {
    html += `<div class="panel resolve-flex"><h3>第 ${state.day} 天 事件結算</h3>
      <div class="resolve-area">${renderEventDetails()}</div>
      ${state.pendingChoice ? '' : `<button class="primary" onclick="finishDay()">${state.loopResult === 'lose' ? '結束本輪' : (state.day >= state.script.daysPerLoop ? '結束本輪' : `進入第 ${state.day+1} 天`)}</button>`}
    </div>`;
  }
  html += `<div class="panel log-flex"><h3>歷程紀錄</h3><div class="log-panel">${renderLog()}</div></div>`;
  html += '</div>';
  return html;
}

function renderAnnouncementPanel() {
  const items = state.announcementLog || [];
  const collapsed = !!state.announcementCollapsed;
  const latest = items[0];
  let html = `<div class="panel ${collapsed?'collapsed':''}">
    <h3 onclick="toggleAnnouncement()" style="cursor:pointer; user-select:none;">📣 能力公告 <span class="toggle-arrow" style="float:right; font-size:11px;">${collapsed?'▶ 展開':'▼ 收合'}</span></h3>`;
  if (collapsed) {
    const summary = latest ? `最近：第 ${latest.loop} 輪第 ${latest.day} 天｜${latest.label}` : '尚無能力公告';
    html += `<div class="resolve-detail" style="color:#888; font-size:10px;">${summary}</div>`;
    html += `</div>`;
    return html;
  }
  if (items.length === 0) {
    html += `<div class="resolve-detail" style="color:#888;">尚無能力公告。這裡會顯示剛剛發生的友好能力、劇作家任意能力與強制能力。</div>`;
  } else {
    html += `<div class="log-panel" style="max-height:150px;">`;
    for (const it of items.slice(0, 8)) {
      html += `<div class="log-entry" style="border-left-color:${it.kind==='friendly'?'#88ff88':(it.kind==='forced'?'#ff8888':'#f0c674')};">
        <b>[第 ${it.loop} 輪 第 ${it.day} 天｜${it.label}]</b><br>${it.text}
      </div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderSecretPanel() {
  const collapsed = state.secretCollapsed;
  let html = `<div class="panel secret ${collapsed?'collapsed':'expanded'}">
    <h3 onclick="toggleSecret()">🎭 劇作家機密（不要被玩家看到）<span class="toggle-arrow">${collapsed?'▶ 展開':'▼ 收合'}</span></h3>`;
  if (!collapsed) {
    html += `<div class="secret-body">
      <div style="font-size:10px; color:#a0a0c0; margin-bottom:4px;">角色身分：</div>`;
    for (const c of state.characters) {
      html += `<div class="role-row">
        <span class="name">${c.name}${c.dead?' (死)':''}</span>
        <span class="role-name">${c.role}</span>
      </div>`;
    }
    if (state.script.events.length > 0) {
      html += `<div style="font-size:10px; color:#a0a0c0; margin:6px 0 4px;">事件當事人：</div>`;
      for (const e of state.script.events) {
        html += `<div class="role-row">
          <span class="name">第 ${e.day} 天 ${e.event}</span>
          <span class="role-name">${e.target}</span>
        </div>`;
      }
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function toggleSecret() {
  state.secretCollapsed = !state.secretCollapsed;
  render();
}

function renderCardPanel() {
  const isM = state.phase === 'mastermind';
  const cards = isM ? MASTERMIND_CARDS : PLAYER_CARDS;
  const usedCount = isM ? state.mUsedOnceCount : state.pUsedOnceCount;
  const plays = isM ? state.mPlays : state.pPlays;
  const playCount = {};
  for (const p of plays) playCount[p.cardId] = (playCount[p.cardId] || 0) + 1;

  let html = `<div class="panel"><h3>${isM?'劇作家':'玩家'}手牌</h3>`;
  if (state.selectedCard) {
    const c = getCard(isM?'m':'p', state.selectedCard);
    html += `<div class="selection-prompt warn">
      <span>已選 <b>${c.name}</b>，請點選地圖目標</span>
      <button class="secondary" onclick="clearSelection()">取消</button>
    </div>`;
  } else {
    html += `<div class="selection-prompt">
      <span>3 張，目標互不相同</span>
      <span style="color:#f0c674;">已出 ${plays.length}/3</span>
    </div>`;
  }
  html += '<div class="card-list">';
  for (const c of cards) {
    const playedToday = playCount[c.id] || 0;
    const effCount = !isM ? getCardEffectiveCount(c) : c.count;
    const usedPast = (usedCount[c.id] || 0);
    let totalUsed, total;
    if (c.once) {
      total = effCount;
      totalUsed = usedPast + playedToday;
    } else {
      total = effCount;
      totalUsed = playedToday;
    }
    const remaining = total - totalUsed;
    const disabled = remaining <= 0 || plays.length >= 3;
    const selected = state.selectedCard === c.id;
    let meta;
    if (c.once) {
      meta = `剩 ${remaining}/${total}・一次性`;
      if (remaining <= 0) meta = '本輪已用完';
    } else {
      meta = `${total}張`;
      if (playedToday > 0) meta = `已用 ${playedToday}/${total}`;
      if (remaining <= 0) meta = '本日已出完';
    }
    html += `<div class="card${disabled?' disabled':''}${selected?' selected':''}${c.once?' once':''}"
      onclick="${disabled?'':`selectCard('${c.id}')`}">
      <div class="card-name">${c.name}</div>
      <div class="card-meta">${meta}</div>
    </div>`;
  }
  html += '</div></div>';
  return html;
}

function renderPlaysPanel() {
  const isM = state.phase === 'mastermind';
  const plays = isM ? state.mPlays : state.pPlays;
  let html = `<div class="panel"><h3>本日預備出牌 (${plays.length}/3)</h3><div class="plays-list">`;
  for (let i = 0; i < 3; i++) {
    if (plays[i]) {
      const c = getCard(isM?'m':'p', plays[i].cardId);
      const tName = targetName(plays[i].target);
      html += `<div class="play-row">
        <span><b>${c.name}</b> → ${tName}</span>
        <button class="play-remove" onclick="removePlay(${i})">移除</button>
      </div>`;
    } else {
      html += `<div class="play-row empty">（第 ${i+1} 張尚未出）</div>`;
    }
  }
  html += '</div>';
  html += `<button class="primary" ${plays.length===3?'':'disabled'} onclick="askSubmit()">送出 3 張</button>`;
  html += '</div>';
  return html;
}

function renderResolveDetails() {
  const log = state.log.find(l => l.kind === 'cards' && l.day === state.day && l.loop === state.loop);
  if (!log) return '';
  let html = '';
  for (const g of log.groups) {
    const tName = targetName(g.target);
    html += `<div class="resolve-detail">
      <div class="target-name">${tName}</div>
      <div style="margin:3px 0;">`;
    g.plays.forEach((p, i) => {
      const cls = `chip ${p.side==='m'?'mastermind':'player'}${g.cancelled.includes(i)?' cancelled':''}`;
      html += `<span class="${cls}">${p.card.name}（${p.side==='m'?'劇':'玩'}）</span> `;
    });
    html += `</div>`;
    if (g.effects.length > 0) html += `<div class="effects">${g.effects.join('<br>')}</div>`;
    html += `</div>`;
  }
  // 邪教徒 任意能力：抵消同區的禁止密謀
  const cultistTargets = getCultistAbleTargets();
  if (cultistTargets.length > 0) {
    html += `<div class="resolve-detail" style="border:1px solid #d04a6a;">
      <div class="target-name" style="color:#ff8888;">邪教徒 任意能力（每日一次）</div>
      <div class="effects" style="margin:4px 0;">劇作家可抵消同區位置上的一張禁止密謀：</div>`;
    cultistTargets.forEach((t) => {
      const locName = t.targetLabel;
      html += `<button class="secondary" style="margin:3px;" onclick="activateCultist(${t.cultistId}, ${t.groupIdx}, ${t.playIdx})">${t.cultistName} 抵消 ${locName} 的禁止密謀</button>`;
    });
    html += `</div>`;
  }
  return html;
}

function getCultistAbleTargets() {
  const todayLog = state.log.find(l => l.kind === 'cards' && l.day === state.day && l.loop === state.loop);
  if (!todayLog) return [];
  const ability = { id: 'cultist_neg', freq: 'day' };
  const out = [];
  for (const cultist of state.characters) {
    if (cultist.role !== '邪教徒' || cultist.dead) continue;
    if (isAbilityUsed(cultist.id, ability)) continue;
    todayLog.groups.forEach((group, gi) => {
      // 該位置（地點）或該地的角色
      let inSameArea = false;
      if (group.target.type === 'loc') {
        inSameArea = group.target.id === cultist.position;
      } else {
        const ch = state.characters.find(x => x.id === group.target.id);
        inSameArea = ch && ch.position === cultist.position;
      }
      if (!inSameArea) return;
      group.plays.forEach((p, pi) => {
        if (p.card.type === 'forbid' && p.card.forbids === 'conspiracy') {
          out.push({
            cultistId: cultist.id,
            cultistName: cultist.name,
            groupIdx: gi,
            playIdx: pi,
            targetLabel: targetName(group.target),
          });
        }
      });
    });
  }
  return out;
}

function activateCultist(cultistId, groupIdx, playIdx) {
  const ability = { id: 'cultist_neg', freq: 'day' };
  if (isAbilityUsed(cultistId, ability)) return;
  const todayLog = state.log.find(l => l.kind === 'cards' && l.day === state.day && l.loop === state.loop);
  if (!todayLog) return;
  const group = todayLog.groups[groupIdx];
  // 禁止密謀 抵消後，原先被它擋下的 密謀牌 重新生效
  let restored = 0;
  group.plays.forEach((p, i) => {
    if (p.card.type === 'conspiracy' && group.cancelled.includes(i)) {
      if (group.target.type === 'loc') {
        const loc = state.locations.find(l => l.id === group.target.id);
        loc.conspiracy += p.card.delta;
      } else {
        const ch = state.characters.find(x => x.id === group.target.id);
        ch.conspiracy += p.card.delta;
      }
      restored += p.card.delta;
      group.cancelled = group.cancelled.filter(idx => idx !== i);
    }
  });
  // 禁止密謀本身視為被抵消
  if (!group.cancelled.includes(playIdx)) group.cancelled.push(playIdx);
  group.effects.push(`邪教徒 抵消禁止密謀，密謀 +${restored}`);
  markAbilityUsed(cultistId, ability);
  render();
}

    }
    html += '</div>';

  }
  if (pc.type === 'playerKill') {
    let html = `<div class="resolve-detail"><div class="target-name">玩家：選一名角色死亡</div>`;
    for (const c of state.characters) {
      if (c.dead) continue;
      html += `<button class="danger" style="margin:3px;" onclick="resolvePlayerKill(${c.id})">${c.name}</button>`;
    }

  }
  if (pc.type === 'missingDest') {

    const def = CHAR_DEFS[c.name];
    const isUnlocked = state.movementUnlocked && state.movementUnlocked.has(c.name);

    let html = `<div class="resolve-detail"><div class="target-name">劇作家：選擇 ${c.name} 的失蹤目的地（禁區無法選）</div>`;

  }
  html += `<button class="primary" onclick="state=null; render();">回到劇本設定</button>
  </div>
  <div class="panel"><h3>歷程紀錄</h3><div class="log-panel">${renderLog()}</div></div>
  </div>`;
  return html;
}

function renderExFriendly() {
  let html = `<div class="main-grid"><div class="panel" style="overflow-y:auto;">
    <h3>輪 ${state.loop} 開始 — ex 槽效果</h3>
    <div style="background:#4a3a1a; border:1px solid #f0c674; border-radius:6px; padding:8px; margin-bottom:10px; font-size:12px; color:#ffe8a0;">
      ex 槽 ≥ 1：選擇一名角色，放置 2 枚友好
    </div>`;
  for (const c of state.characters) {
    if (c.dead) continue;
    html += `<button class="primary" style="margin:4px; width:auto; padding:8px 14px;" onclick="applyExFriendly(${c.id})">${c.name}</button>`;
  }
  html += `</div>
  <div class="panel"><h3>歷程紀錄</h3><div class="log-panel">${renderLog()}</div></div>
  </div>`;
  return html;
}

function renderGuessPhase() {
  const availableRoles = [...new Set(state.script.characters.map(c => c.role))];
  let html = `<div class="main-grid"><div class="panel" style="overflow-y:auto;">
    <h3>最終 — 猜出所有角色身分</h3>
    <div style="background:#4a3a1a; border:1px solid #f0c674; border-radius:6px; padding:8px; margin-bottom:10px; font-size:12px; color:#ffe8a0;">
      ${state.script.loops} 輪皆未存活。最後機會：將每位角色配對到正確身分，全部正確即玩家勝利。
    </div>`;
  for (const c of state.characters) {
    const sel = state.guesses[c.id] || '';
    html += `<div class="resolve-detail">
      <div class="target-name">${c.name}</div>
      <select onchange="setGuess(${c.id}, this.value)"
        style="margin-top:5px; padding:5px 8px; background:#1a1a2e; color:#e8e8f0; border:1px solid #3a3a5c; border-radius:4px; font-size:12px;">
        <option value="">-- 請選擇身分 --</option>
        ${availableRoles.map(r => `<option value="${r}" ${sel===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>`;
  }
  const allGuessed = state.characters.every(c => state.guesses[c.id]);
  html += `<button class="primary" ${allGuessed?'':'disabled'} onclick="submitGuess()">確認猜測</button>
  </div>
  <div class="panel"><h3>歷程紀錄</h3><div class="log-panel">${renderLog()}</div></div>
  </div>`;
  return html;
}

function renderLog() {
  if (state.log.length === 0) return '<div style="color:#666; font-size:10px;">尚無紀錄</div>';
  let html = '';
  let lastKey = '';
  for (const entry of state.log) {
    const k = `L${entry.loop}D${entry.day}`;
    if (k !== lastKey) {
      html += `<div class="log-day-header">輪 ${entry.loop} · 第 ${entry.day} 天</div>`;
      lastKey = k;
    }
    if (entry.kind === 'cards') {
      for (const g of entry.groups) {
        const tName = targetName(g.target);
        html += `<div class="log-entry"><b>${tName}</b>：`;
        g.plays.forEach((p, i) => {
          const ct = g.cancelled.includes(i) ? 'cancelled' : '';
          html += `<span class="chip ${p.side==='m'?'mastermind':'player'} ${ct}" style="margin:1px;">${p.card.name}</span>`;
        });
        if (g.effects.length > 0) {
          html += `<div style="font-size:9px; color:#888; margin-top:2px;">${g.effects.join(' / ')}</div>`;
        }
        html += `</div>`;
      }
    } else if (entry.kind === 'event') {
      // 當事人為機密，不在公開紀錄顯示（劇作家可在其機密面板對照）
      html += `<div class="log-entry event"><b>事件 ${entry.event}</b> ${entry.triggered?'已觸發':'未觸發'}`;
      if (entry.log && entry.log.length > 0) {
        html += `<div style="font-size:9px; color:#888; margin-top:2px;">${entry.log.join(' / ')}</div>`;
      }
      html += `</div>`;
    } else if (entry.kind === 'friendly') {
      html += `<div class="log-entry" style="border-left-color:#88ff88;"><b>友好階段</b>`;
      if (entry.log && entry.log.length > 0) {
        html += `<div style="font-size:9px; color:#888; margin-top:2px;">${entry.log.join(' / ')}</div>`;
      }
      html += `</div>`;
    }
  }
  return html;
}

function renderConfirmModal() {
  const isM = state.phase === 'mastermind';
  const plays = isM ? state.mPlays : state.pPlays;
  let listHtml = '';
  for (const p of plays) {
    const c = getCard(isM?'m':'p', p.cardId);
    listHtml += `<div class="confirm-row"><b>${c.name}</b> → ${targetName(p.target)}</div>`;
  }
  return `
    <div class="overlay">
      <div class="modal">
        <h2>確認送出</h2>
        <p>送出後本日出牌就無法修改。確認以下 3 張？</p>
        <div class="confirm-list">${listHtml}</div>
        <div class="modal-actions">
          <button class="cancel" onclick="cancelSubmit()">取消修改</button>
          <button class="confirm" onclick="doSubmit()">確認送出</button>
        </div>
      </div>
    </div>`;
}

// =========================================
// 互動
// =========================================
function startGame() {
  const text = document.getElementById('scriptInput').value;
  const script = parseScript(text);
  const errs = validateScript(script);
  if (errs.length > 0) {
    document.getElementById('setupErr').innerHTML = '錯誤：' + errs.join('；');
    return;
  }
  if (Net.enabled && !Net.suppressBroadcast) {
    Net.send({ action: 'startGameRemote', script });
  }
  actuallyStartGame(script);
}

function actuallyStartGame(script) {
  newGame(script);
  if (Net.enabled) {
    // 網路模式：劇作家直接進 mastermind 階段；玩家進等待
    if (Net.role === 'mastermind') {
      state.phase = 'mastermind';
      // 若有 dynamicInit 角色 → masterPickInit
      const needsInit = state.characters.some(c => CHAR_DEFS[c.name]?.dynamicInit && !c.dead && c.position === null);
      if (needsInit) state.phase = 'masterPickInit';
    } else {
      state.phase = 'netWaiting';
      state.netWaitingFor = 'mastermind';
    }
  } else {
    state.phase = 'switch';
    state.nextRoleLabel = '劇作家';
    state.nextPhase = 'mastermind';
  }
  render();
}

function selectCard(cardId) {
  const isM = state.phase === 'mastermind';
  const usedCount = isM ? state.mUsedOnceCount : state.pUsedOnceCount;
  const plays = isM ? state.mPlays : state.pPlays;
  const card = getCard(isM?'m':'p', cardId);
  const effCount = !isM ? getCardEffectiveCount(card) : card.count;
  const playedToday = plays.filter(p => p.cardId === cardId).length;
  if (card.once) {
    // 一次性卡：每張用一次後消失，有 count 張可用
    const usedPast = (usedCount[cardId] || 0);
    if (usedPast + playedToday >= effCount) return;
  } else {
    // 非一次性：每天最多 count 次
    if (playedToday >= effCount) return;
  }
  if (plays.length >= 3) return;
  state.selectedCard = cardId;
  render();
}
function clearSelection() { state.selectedCard = null; render(); }

function onClickTarget(type, id) {
  if (!state.selectedCard) return;
  const target = { type, id };
  if (!isSelectableTarget(target)) return;
  const isM = state.phase === 'mastermind';
  const plays = isM ? state.mPlays : state.pPlays;
  plays.push({ cardId: state.selectedCard, target });
  state.selectedCard = null;
  render();
}

function removePlay(idx) {
  const isM = state.phase === 'mastermind';
  const plays = isM ? state.mPlays : state.pPlays;
  plays.splice(idx, 1);
  render();
}
function removePlayByTarget(type, id) {
  const isM = state.phase === 'mastermind';
  const plays = isM ? state.mPlays : state.pPlays;
  const idx = plays.findIndex(p => p.target.type === type && p.target.id === id);
  if (idx >= 0) { plays.splice(idx, 1); render(); }
}

function askSubmit() { pendingConfirm = true; render(); }
function cancelSubmit() { pendingConfirm = null; render(); }
function doSubmit() {
  pendingConfirm = null;
  if (Net.enabled && !Net.suppressBroadcast) {
    if (state.phase === 'mastermind') {
      // 線上：發送全部出牌（伺服器只把目標轉給玩家，內容暫存）
      Net.send({ action: 'mSubmit', plays: state.mPlays });
      state.phase = 'netWaiting';
      state.netWaitingFor = 'player';
      render();
      return;
    }
    if (state.phase === 'player') {
      Net.send({ action: 'pSubmit', plays: state.pPlays });
      state.phase = 'netWaiting';
      state.netWaitingFor = 'resolve';
      render();
      return;
    }
  }
  // 本機模式
  if (state.phase === 'mastermind') {
    state.phase = 'switch';
    state.nextRoleLabel = '玩家';
    state.nextPhase = 'player';
    render();
  } else if (state.phase === 'player') {
    resolveCards();
    state.phase = 'resolve';
    render();
  }
}

function proceedToEvent() {
  startEventPhase();
}

function confirmHandoff() {
  state.phase = state.nextPhase;
  state.selectedCard = null;
  // 進入劇作家階段且有 dynamicInit 角色尚未選位 → 先 masterPickInit
  if (state.phase === 'mastermind') {
    const needsInit = state.characters.some(c => CHAR_DEFS[c.name]?.dynamicInit && !c.dead && c.position === null);
    if (needsInit) state.phase = 'masterPickInit';
  }
  render();
}

function pickInitPos(qid) {
  if (state.phase !== 'masterPickInit') return;
  const c = state.characters.find(x => CHAR_DEFS[x.name]?.dynamicInit && !x.dead && x.position === null);
  if (!c) { state.phase = 'mastermind'; render(); return; }
  c.position = qid;
  state.log.unshift({ day: state.day, loop: state.loop, kind: 'init', log: [`劇作家設定 ${c.name} 初始位置：${quadName(qid)}`] });
  // 檢查還有沒有其他需要選位
  const more = state.characters.some(x => CHAR_DEFS[x.name]?.dynamicInit && !x.dead && x.position === null);
  if (!more) state.phase = 'mastermind';
  render();
}

function renderMasterPickInit() {
  const c = state.characters.find(x => CHAR_DEFS[x.name]?.dynamicInit && !x.dead && x.position === null);
  if (!c) return '';
  return `<div class="main-grid"><div class="panel" style="overflow-y:auto;">
    <h3>🎭 劇作家：選擇 ${c.name} 的初始位置</h3>
    <div style="background:#4a3a1a; border:1px solid #f0c674; border-radius:6px; padding:8px; margin:8px 0; font-size:12px; color:#ffe8a0;">
      此角色每輪由劇作家動態決定初始位置（不會公開給玩家）。
    </div>
    <div class="resolve-detail">
      <button class="primary" style="margin:6px; width:auto; padding:10px 22px;" onclick="pickInitPos(1)">神社</button>
      <button class="primary" style="margin:6px; width:auto; padding:10px 22px;" onclick="pickInitPos(2)">醫院</button>
      <button class="primary" style="margin:6px; width:auto; padding:10px 22px;" onclick="pickInitPos(3)">都會</button>
      <button class="primary" style="margin:6px; width:auto; padding:10px 22px;" onclick="pickInitPos(4)">學校</button>
    </div>
  </div>
  <div class="panel"><h3>歷程紀錄</h3><div class="log-panel">${renderLog()}</div></div>
  </div>`;
}

// =========================================
// 啟動
// =========================================
function setupNetworkActionWrappers() {
  // 只包裝由「使用者點擊」觸發的入口；內部呼叫的函式不包裝以免重複廣播
  const actionsToWrap = [
    // 階段轉換按鈕
    'startMasterAbilityPhase','endMasterAbilityPhase','endFriendlyPhase',
    'finishDay','continueAfterLoop',
    // 劇作家能力
    'tryUseMasterAbility','resolveMasterAbility',
    'tryUseRuleAbility','resolveRuleAbility',
    'activateCultist',
    // 友好能力
    'tryUseAbility','resolveFriendlyAbility','cancelFriendlyTarget',
    'masterAllowFriendly','masterDenyFriendly','wizardChoice',
    'forensicSelectSource','forensicSelectMarker','forensicSelectDest','forensicBackStep',
    'informantDeclare','informantReveal','informantBackStep',
    // 事件選擇
    'resolveMastermindKill','resolveUnease','resolvePlayerKill','resolveMissingDest',
    // 其他點擊
    'submitGuess','setGuess','applyExFriendly','pickInitPos',
  ];
  for (const name of actionsToWrap) Net.wrap(name);
}
setupNetworkActionWrappers();

// 初始顯示模式選擇
document.getElementById('app').innerHTML = renderModeChoice();
</script>
