<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>慘劇 Tragedy</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: #1a1a2e;
    color: #e8e8f0;
  }
  #app {
    height: 100vh;
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: #232342;
    border-radius: 10px;
    border: 1px solid #3a3a5c;
    flex-shrink: 0;
  }
  h1 { margin: 0; font-size: 18px; color: #f0c674; }
  .day-info { font-size: 13px; color: #a0a0c0; }
  .role-banner { padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 13px; }
  .role-banner.mastermind { background: #6b1a3a; color: #ffe0e8; }
  .role-banner.player { background: #1a4a6b; color: #e0f0ff; }
  .role-banner.resolve { background: #4a6b1a; color: #f0ffe0; }
  .role-banner.event { background: #6b4a1a; color: #ffe8c0; }

  /* 行事曆 */
  .calendar {
    display: flex;
    gap: 6px;
    padding: 6px 10px;
    background: #232342;
    border-radius: 8px;
    border: 1px solid #3a3a5c;
    flex-shrink: 0;
  }
  .cal-day {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #3a3a5c;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 11px;
    line-height: 1.4;
  }
  .cal-day.current { border-color: #f0c674; background: #2a2a3a; }
  .cal-day .day-num { color: #f0c674; font-weight: bold; font-size: 12px; }
  .cal-day .ev-name { color: #ff8866; font-weight: bold; }
  .cal-day .ev-target { color: #ffaaaa; font-size: 10px; }

  .main-grid {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    gap: 12px;
    overflow: hidden;
    min-height: 0;
  }

  /* 地圖 */
  .map {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
    background: #16162a;
    padding: 6px;
    border-radius: 10px;
    border: 1px solid #3a3a5c;
    min-height: 0;
    overflow: hidden;
  }
  .location {
    background: #2a2a48;
    border: 2px solid #3a3a5c;
    border-radius: 8px;
    padding: 7px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
    transition: border-color 0.15s;
    position: relative;
  }
  .location.selectable {
    border-color: #f0c674;
    box-shadow: 0 0 0 2px #f0c67455;
    cursor: pointer;
  }
  .location.selectable::after {
    content: "點此放置";
    position: absolute;
    bottom: 3px;
    right: 7px;
    font-size: 9px;
    color: #f0c674;
  }

svg%3E"); background-size: cover; background-position: center; background-repeat: no-repeat; }
  .location.loc-4 { background-image: linear-gradient(rgba(42,42,72,0.48), rgba(42,42,72,0.72)), url("data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20400%20240%27%3E%0A%3Crect%20width%3D%27400%27%20height%3D%27240%27%20fill%3D%27%232e314e%27/%3E%3Crect%20x%3D%2775%27%20y%3D%2775%27%20width%3D%27250%27%20height%3D%27110%27%20rx%3D%278%27%20fill%3D%27%23d9d0b8%27/%3E%3Cpolygon%20points%3D%2760%2C85%20200%2C30%20340%2C85%27%20fill%3D%27%238b5f4a%27/%3E%0A%3Crect%20x%3D%27110%27%20y%3D%27105%27%20width%3D%2745%27%20height%3D%2735%27%20fill%3D%27%2388a0c8%27/%3E%3Crect%20x%3D%27172%27%20y%3D%27105%27%20width%3D%2755%27%20height%3D%2780%27%20fill%3D%27%236b4a3a%27/%3E%3Crect%20x%3D%27245%27%20y%3D%27105%27%20width%3D%2745%27%20height%3D%2735%27%20fill%3D%27%2388a0c8%27/%3E%0A%3Crect%20x%3D%2740%27%20y%3D%27155%27%20width%3D%2780%27%20height%3D%2745%27%20rx%3D%276%27%20fill%3D%27%232e4f3b%27/%3E%3Crect%20x%3D%2748%27%20y%3D%27163%27%20width%3D%2764%27%20height%3D%2729%27%20fill%3D%27%23406c52%27/%3E%3Cpath%20d%3D%27M130%20185%20H360%27%20stroke%3D%27%237f907a%27%20stroke-width%3D%274%27/%3E%0A%3C/svg%3E"); background-size: cover; background-position: center; background-repeat: no-repeat; }
  .location-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    padding-bottom: 3px;
    border-bottom: 1px solid #3a3a5c;
    flex-shrink: 0;
  }
  .location-name { font-weight: bold; color: #f0c674; font-size: 12px; }
  .conspiracy {
    background: #3a1a4a;
    color: #d99cff;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
  }
  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-bottom: 3px;
    min-height: 18px;
  }
  .chip {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .chip.player { background: #1a4a6b; color: #e0f0ff; border: 1px solid #4a8ad0; }
  .chip.mastermind { background: #6b1a3a; color: #ffe0e8; border: 1px solid #d04a6a; }
  .chip.mastermind.hidden { color: #d04a6a; }
  .chip.removable:hover { opacity: 0.6; text-decoration: line-through; }
  .chip.cancelled { text-decoration: line-through; opacity: 0.5; }

  .character-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
    overflow-y: auto;
    min-height: 0;
  }
  .character {
    background: #1a1a2e;
    border: 1px solid #3a3a5c;
    border-radius: 4px;
    padding: 4px 6px;
    cursor: pointer;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .character.selectable {
    border-color: #f0c674;
    box-shadow: 0 0 0 1px #f0c67455;
  }
  .character.over-anxiety { background: #4a1a1a; }
  .character.dead {
    background: #16161e;
    color: #555;
    cursor: not-allowed;
    border-style: dashed;
  }
  .character.dead .char-name::before { content: "💀 "; }
  .char-row { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
  .char-name { font-weight: bold; font-size: 11px; }
  .char-role-badge {
    font-size: 9px;
    color: #f0c674;
    background: #3a2a1a;
    padding: 0 5px;
    border-radius: 3px;
    margin-left: 4px;
  }
  .char-stats { display: flex; gap: 5px; font-size: 9px; color: #a0a0c0; }
  .stat-anxiety { color: #ff8888; }
  .stat-friendly { color: #88ff88; }
  .stat-cons { color: #d99cff; }
  .char-chips { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 2px; }

  /* 側欄 */
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
  }
  .side-panel > .panel { flex: 0 0 auto; }
  .side-panel > .panel.log-flex { flex: 1 1 0; min-height: 100px; }
  .side-panel > .panel.resolve-flex { flex: 1 1 0; min-height: 200px; }
  .panel {
    background: #232342;
    border: 1px solid #3a3a5c;
    border-radius: 8px;
    padding: 8px 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel h3 {
    margin: 0 0 6px 0;
    font-size: 12px;
    color: #f0c674;
    border-bottom: 1px solid #3a3a5c;
    padding-bottom: 3px;
    flex-shrink: 0;
  }
  .panel.secret { border-color: #d04a6a; background: #2a1a2a; }
  .panel.secret.expanded { max-height: 28vh; }
  .panel.secret.collapsed { max-height: none; }
  .panel.secret h3 {
    color: #ff8888;
    border-bottom-color: #d04a6a;
    cursor: pointer;
    user-select: none;
    margin-bottom: 0;
    padding-bottom: 6px;
    border-bottom: 1px solid #d04a6a;
  }
  .panel.secret.collapsed h3 { border-bottom: none; padding-bottom: 0; }
  .panel.secret h3 .toggle-arrow { float: right; font-size: 11px; }
  .secret-body { overflow-y: auto; flex: 1; min-height: 0; padding-right: 4px; padding-top: 6px; }

  .selection-prompt {
    background: #1a4a6b;
    color: #e0f0ff;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .selection-prompt.warn { background: #4a3a1a; color: #ffe8a0; }

  .card-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
  }
  .card {
    background: #2a2a48;
    border: 1px solid #4a4a6c;
    border-radius: 4px;
    padding: 4px 5px;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    text-align: center;
  }
  .card:hover:not(.disabled) { background: #3a3a58; border-color: #6a6aaa; }
  .card.disabled { opacity: 0.3; cursor: not-allowed; }
  .card.selected { background: #4a3a6a; border-color: #f0c674; box-shadow: 0 0 0 2px #f0c67455; }
  .card.once { border-style: dashed; }
  .card-name { font-weight: bold; }
  .card-meta { font-size: 8px; color: #888; }

  .plays-list { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .play-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1a1a2e;
    padding: 4px 7px;
    border-radius: 4px;
    border: 1px solid #3a3a5c;
    font-size: 11px;
  }
  .play-row.empty { color: #666; font-style: italic; justify-content: center; }
  .play-remove {
    background: #6b1a3a;
    color: white;
    border: none;
    border-radius: 3px;
    padding: 1px 6px;
    cursor: pointer;
    font-size: 9px;
  }

  button.primary {
    background: #4a8ad0;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    margin-top: 5px;
  }
  button.primary:hover:not(:disabled) { background: #5a9ae0; }
  button.primary:disabled { background: #3a3a5c; cursor: not-allowed; opacity: 0.5; }
  button.secondary {
    background: #3a3a5c;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 3px 9px;
    font-size: 10px;
    cursor: pointer;
  }
  button.danger { background: #6b1a3a; color: white; border: none; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; }
  button.danger:hover { background: #8b2a4a; }

  .log-panel { overflow-y: auto; }
  .log-entry {
    background: #1a1a2e;
    border-left: 3px solid #4a8ad0;
    padding: 4px 6px;
    margin-bottom: 3px;
    font-size: 10px;
    border-radius: 3px;
  }
  .log-entry.event { border-left-color: #f0c674; }
  .log-day-header {
    color: #f0c674;
    font-weight: bold;
    margin-top: 4px;
    margin-bottom: 2px;
    font-size: 11px;
  }
  .log-day-header:first-child { margin-top: 0; }

  /* Modal & Setup */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 20, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal {
    background: #232342;
    border: 1px solid #3a3a5c;
    border-radius: 12px;
    padding: 20px 24px;
    max-width: 600px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 20px; color: #f0c674; margin: 0 0 10px 0; }
  .modal p { color: #a0a0c0; margin: 0 0 12px 0; font-size: 13px; }
  .modal textarea {
    width: 100%;
    min-height: 200px;
    background: #1a1a2e;
    color: #e8e8f0;
    border: 1px solid #3a3a5c;
    border-radius: 6px;
    padding: 8px;
    font-family: monospace;
    font-size: 12px;
    resize: vertical;
  }
  .modal .confirm-list {
    background: #1a1a2e;
    border: 1px solid #3a3a5c;
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 12px;
  }
  .modal .confirm-row {
    padding: 3px 0;
    font-size: 12px;
    border-bottom: 1px dashed #3a3a5c;
  }
  .modal .confirm-row:last-child { border-bottom: none; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .modal button {
    border: none;
    border-radius: 5px;
    padding: 8px 16px;
    font-size: 13px;

<script>
// =========================================
// 線上對戰 Net 模組
// =========================================
const Net = {
  enabled: false,
  ws: null,
  role: null,    // 'mastermind' | 'player'
  code: null,
  paired: false,
  suppressBroadcast: false,
  status: 'idle', // idle | connecting | waiting | paired | err

  connect(roleAction, code) {
    return new Promise((resolve, reject) => {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${proto}//${location.host}`;
      try { this.ws = new WebSocket(url); } catch (e) { return reject(e); }
      this.ws.onopen = () => {
        if (roleAction === 'create') this.ws.send(JSON.stringify({ type: 'create' }));
        else this.ws.send(JSON.stringify({ type: 'join', code }));
        resolve();
      };
      this.ws.onerror = () => { this.status = 'err'; reject(new Error('連線失敗')); };
      this.ws.onmessage = (ev) => {
        let d; try { d = JSON.parse(ev.data); } catch { return; }
        Net.onMessage(d);
      };
      this.ws.onclose = () => {
        this.enabled = false; this.paired = false;
        if (state) render();
      };
    });
  },

  send(payload) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({ type: 'msg', payload }));
    }
  },

  onMessage(data) {
    if (data.type === 'lobby') {
      this.enabled = true;
      this.role = data.role;
      this.code = data.code;
      this.paired = data.state === 'paired';
      this.status = data.state;
      render();
    } else if (data.type === 'error') {
      alert('錯誤：' + data.msg);
      this.status = 'err';
      render();
    } else if (data.type === 'opponentDisconnected') {
      alert('對手已離開');
      this.enabled = false;
      this.paired = false;
      location.reload();
    } else if (data.type === 'msg') {
      Net.handleAction(data.payload);
    }
  },

  handleAction(payload) {
    Net.suppressBroadcast = true;
    try {
      const a = payload.action;
      if (a === 'startGameRemote') { actuallyStartGame(payload.script); return; }
      if (a === 'mTargets') {
        // 玩家端：劇作家送出後，公開目標但不公開內容
        state.mPlays = payload.targets.map(t => ({ target: t, cardId: '_hidden' }));
        state.phase = 'player';
        state.netWaitingFor = null;
        render();
        return;
      }
      if (a === 'pSubmit') {
        // 劇作家端：玩家送出全部出牌
        state.pPlays = payload.plays || [];
        resolveCards();
        state.phase = 'resolve';
        state.netWaitingFor = null;
        render();
        return;
      }
      if (a === 'mFullReveal') {
        // 玩家端：在玩家送出後，劇作家全部出牌被公開
        state.mPlays = payload.plays || [];
        resolveCards();
        state.phase = 'resolve';
        state.netWaitingFor = null;
        render();
        return;
      }
      // 一般動作：呼叫對應全域函式（會略過廣播因 suppressBroadcast=true）
      const fn = window[a];
      if (typeof fn === 'function') fn(...(payload.args || []));
    } finally {
      Net.suppressBroadcast = false;
    }
  },

  // 角色屬於哪個階段（決定誰能操作）
  expectedRole(phase) {
    if (phase === 'mastermind' || phase === 'masterPickInit' || phase === 'masterAbility') return 'mastermind';
    if (phase === 'player' || phase === 'exFriendly') return 'player';
    if (phase === 'friendly') {
      // 無視友好 劇作家決定 → 換劇作家操作
      if (state && state.pendingChoice && state.pendingChoice.type === 'masterRejectDecision') return 'mastermind';
      return 'player';
    }
    if (phase === 'event') {
      if (state && state.pendingChoice) {
        if (state.pendingChoice.type === 'mastermindKill' || state.pendingChoice.type === 'mastermindUnease' || state.pendingChoice.type === 'missingDest') return 'mastermind';
        if (state.pendingChoice.type === 'playerKill') return 'player';
      }
      // 事件結算後的「進入下一天 / 結束本輪」只能由劇作家推進，避免雙端各自 +1 天。
      return 'mastermind';
    }
    // 這些階段會推進 loop/day/phase，線上模式下也固定由劇作家按一次再同步。
    if (phase === 'resolve' || phase === 'loopEnd') return 'mastermind';
    return null; // shared (gameover / guess / switch)
  },

  isMyTurn() {
    if (!this.enabled) return true;
    const r = this.expectedRole(state ? state.phase : null);
    if (!r) return true; // shared phase
    return r === this.role;
  },

  wrap(name) {
    const orig = window[name];
    if (typeof orig !== 'function') return;
    window[name] = function(...args) {
      if (Net.enabled && !Net.suppressBroadcast) {
        // 舊畫面殘留或雙擊時，不是自己的階段就直接忽略。
        if (!Net.isMyTurn()) { render(); return; }
        Net.send({ action: name, args });
        // 執行本地動作期間暫停廣播，避免 endFriendlyPhase→startEventPhase→finishDay
        // 這類內部呼叫又被包裝函式再次送出，造成另一端多推進一天。
        Net.suppressBroadcast = true;
        try { return orig.apply(this, args); }
        finally { Net.suppressBroadcast = false; }
      }
      return orig.apply(this, args);
    };
  },
};

// =========================================
// 劇本解析
// =========================================
const CN_NUM = {一:1,二:2,三:3,四:4,五:5,六:6,七:7,八:8,九:9,十:10};

function parseScript(text) {
  const out = { loops: 1, daysPerLoop: 4, characters: [], events: [], Y1:null, Y2:null, X1:null, X2:null, name: null, description: null };
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  for (const line of lines) {
    let m;
    // 劇本名稱 / 說明（純記錄不影響流程）
    m = line.match(/^劇本名稱[：:]\s*(.+)/);
    if (m) { out.name = m[1].trim(); continue; }
    m = line.match(/^劇本說明[：:]\s*(.*)/);
    if (m) { out.description = m[1].trim(); continue; }
    // Y/X 規則
    m = line.match(/^Y1\s*(.+)/);
    if (m) { out.Y1 = m[1].trim(); continue; }
    m = line.match(/^Y2\s*(.+)/);
    if (m) { out.Y2 = m[1].trim(); continue; }
    // X1 與 X2 可能寫在同一行
    if (/^X[12]/.test(line)) {
      const x1m = line.match(/X1\s*(.+?)(?=\s*(?:X2|$))/);
      if (x1m) out.X1 = x1m[1].trim();
      const x2m = line.match(/X2\s*(.+)$/);
      if (x2m) out.X2 = x2m[1].trim();
      continue;
    }
    // 計數
    if (line.includes('輪迴次數') || line.includes('輪迴數')) {
      const n = parseInt(line.replace(/[^\d]/g, ''));
      if (n) out.loops = n;
      continue;
    }
    if (line.includes('一輪天數') || line.includes('輪迴天數') || /^\s*天數/.test(line)) {
      const n = parseInt(line.replace(/[^\d]/g, ''));
      if (n) out.daysPerLoop = n;
      continue;
    }
    // 標題列跳過
    if (line.includes('角色與身分') || line.includes('事件與當事人')) continue;
    // 事件：第N天 + 事件名 + 當事人  或  N + 事件名 + 當事人
    const evM = line.match(/^(?:第)?(\S+?)(?:天)?\s+(\S+)\s+(\S+)$/);
    if (evM) {
      const dayStr = evM[1];
      let day = /^\d+$/.test(dayStr) ? parseInt(dayStr) : CN_NUM[dayStr];
      if (day && EVENT_DEFS[evM[2]]) {
        out.events.push({ day, event: evM[2], target: evM[3] });
        continue;
      }
    }
    // 角色：<角色名> <身分> [<出場日/輪>]
    const charM = line.match(/^(\S+)\s+(\S+)(?:\s+(\d+))?$/);
    if (charM && CHAR_DEFS[charM[1]]) {
      const obj = { name: charM[1], role: charM[2] };
      if (charM[3]) {
        const n = parseInt(charM[3]);
        if (charM[1] === '轉校生') obj.appearanceDay = n;
        else if (charM[1] === '神靈') obj.appearanceLoop = n;
      }
      out.characters.push(obj);
    }
  }
  return out;
}

function computeExpectedRoles(script) {
  // 由 Y1 + X1 + X2 拼出預期身分清單，套用上限後以平民補滿
  const list = [];
  if (script.Y1 && RULE_Y_DEFS[script.Y1]) list.push(...(RULE_Y_DEFS[script.Y1].roles || []));
  if (script.X1 && RULE_X_DEFS[script.X1]) list.push(...(RULE_X_DEFS[script.X1].roles || []));
  if (script.X2 && RULE_X_DEFS[script.X2]) list.push(...(RULE_X_DEFS[script.X2].roles || []));
  // 套用上限（傳謠人/深潛者/巫師 各最多一名）
  const seen = {};
  const capped = [];
  for (const r of list) {
    if (ROLE_CAP[r]) {
      seen[r] = (seen[r] || 0) + 1;
      if (seen[r] > ROLE_CAP[r]) continue; // 超過部分被略過（用平民代替）
    }
    capped.push(r);
  }
  // 補平民
  while (capped.length < script.characters.length) capped.push('平民');
  return capped;
}

function validateScript(script) {
  const errs = [];
  // Y/X 規則存在
  if (!script.Y1) errs.push('缺少 Y1 規則');
  else if (!RULE_Y_DEFS[script.Y1]) errs.push(`未知 Y 規則：${script.Y1}`);
  if (script.Y2 && !RULE_Y_DEFS[script.Y2]) errs.push(`未知 Y 規則：${script.Y2}`);
  if (!script.X1) errs.push('缺少 X1 規則');
  else if (!RULE_X_DEFS[script.X1]) errs.push(`未知 X 規則：${script.X1}`);
  if (!script.X2) errs.push('缺少 X2 規則');
  else if (!RULE_X_DEFS[script.X2]) errs.push(`未知 X 規則：${script.X2}`);
  // 瘋狂的真相 → 情報商必須登場
  const hasMadTruth = script.X1 === '瘋狂的真相' || script.X2 === '瘋狂的真相';
  if (hasMadTruth) {
    if (!script.characters.some(c => c.name === '情報商')) errs.push('瘋狂的真相 規則：情報商必須登場');
    if (!script.Y2) errs.push('瘋狂的真相 規則：必須提供 Y2');
  }
  // 祭品 必須作為某事件當事人
  const sacrificeChars = script.characters.filter(c => c.role === '祭品').map(c => c.name);
  const eventTargets = new Set(script.events.map(e => e.target));
  for (const sname of sacrificeChars) {
    if (!eventTargets.has(sname)) {
      errs.push(`祭品 ${sname} 必須作為某事件的當事人`);
    }
  }
  // X1 == X2 不允許
  if (script.X1 && script.X2 && script.X1 === script.X2) {
    errs.push('X1 與 X2 不可相同');
  }
  // 規則必須身分數量是否超過角色數
  const requiredRoles = [];
  if (script.Y1 && RULE_Y_DEFS[script.Y1]) requiredRoles.push(...(RULE_Y_DEFS[script.Y1].roles || []));
  if (script.X1 && RULE_X_DEFS[script.X1]) requiredRoles.push(...(RULE_X_DEFS[script.X1].roles || []));
  if (script.X2 && RULE_X_DEFS[script.X2]) requiredRoles.push(...(RULE_X_DEFS[script.X2].roles || []));
  const seenReq = {};
  const cappedReq = [];
  for (const r of requiredRoles) {
    if (ROLE_CAP[r]) {
      seenReq[r] = (seenReq[r] || 0) + 1;
      if (seenReq[r] > ROLE_CAP[r]) continue;
    }
    cappedReq.push(r);
  }
  if (cappedReq.length > script.characters.length) {
    errs.push(`角色數不足：Y/X 規則需要至少 ${cappedReq.length} 個身分，但劇本只有 ${script.characters.length} 名角色`);
  }
  // 角色身分多重集 對應檢查
  const expected = computeExpectedRoles(script).slice().sort();
  const actual = script.characters.map(c => c.role).slice().sort();
  if (expected.length !== actual.length) {
    errs.push(`身分數量不符：實際 ${actual.length}，預期 ${expected.length}`);
  } else {
    for (let i = 0; i < expected.length; i++) {
      if (expected[i] !== actual[i]) {
        errs.push(`身分組合不符：實際 [${actual.join(',')}] 預期 [${expected.join(',')}]`);
        break;
      }
    }
  }
  // 角色 / 身分 已知性
  for (const c of script.characters) {
    if (!CHAR_DEFS[c.name]) errs.push(`未知角色：${c.name}`);
    if (!ROLE_DEFS[c.role]) errs.push(`未知身分：${c.role}`);
  }
  // 事件
  const charNames = new Set(script.characters.map(c => c.name));
  const usedTargets = new Set();
  for (const e of script.events) {
    if (!EVENT_DEFS[e.event]) errs.push(`未知事件：${e.event}`);
    if (!charNames.has(e.target)) errs.push(`事件當事人不在角色清單中：${e.target}`);
    if (usedTargets.has(e.target)) errs.push(`事件當事人重複使用：${e.target}`);
    usedTargets.add(e.target);
  }
  return errs;
}

// =========================================
// 狀態
// =========================================
let state = null;
let pendingConfirm = null;

function newGame(script) {
  state = {
    phase: 'mastermind',
    script,
    loop: 1,
    day: 1,
    characters: script.characters.map((c, i) => {
      const def = CHAR_DEFS[c.name];
      return {
        id: i,
        name: c.name,
        role: c.role,
        appearanceDay: c.appearanceDay || null,
        appearanceLoop: c.appearanceLoop || null,
        position: def.dynamicInit ? null : def.initPos,
        anxietyLimit: def.anxietyLimit,
        anxiety: 0,
        friendly: 0,
        conspiracy: 0,
        dead: false,
        offBoard: false,
      };
    }),
    locations: LOCATIONS.map(l => ({ ...l, conspiracy: 0 })),
    mPlays: [],
    pPlays: [],
    selectedCard: null,
    mUsedOnceCount: {},  // {cardId: 已用張數}
    pUsedOnceCount: {},
    log: [],
    tindalosActive: false,
    loopResult: null,        // 'win' | 'lose' | null
    loopReason: '',
    pastLoops: [],           // [{ loop, result, reason }]
    pendingChoice: null,     // 事件需要選擇時用
    eventOutcome: null,      // 當前事件結果
    dailyAbilityUsed: {},    // {charId_abilId:true} 每日重置
    loopAbilityUsed: {},     // {charId_abilId:true} 每輪重置
    revealedRoles: {},       // {charId: role} 已被公開的身分
    friendlyLog: [],         // 當日友好階段紀錄
    secretCollapsed: false,
    announcementCollapsed: false,
    eventBlockedTargets: new Set(),  // 本輪以這些角色為當事人的事件不會觸發
    revealedEventTargets: {},        // {day: targetName} 已公開的事件當事人
    movementUnlocked: new Set(),     // 本輪解除移動限制的角色名（醫生友好3）
    ex: 0,                           // ex 槽（神話知識），跨輪累計
    exAtLoopStart: 0,                // 輪開始時的 ex 槽（用於瘋狂的真相 Y 切換）
    exIncreasedThisLoop: false,      // 本輪 ex 是否曾增加（用於 黃衣之王）
    guardedChars: new Set(),         // 持有護衛指示物的角色 id（刑警友好5）
    masterAbilityLog: [],
    publicMasterAbilityLog: [],
    announcementLog: [],        // 公告欄：顯示剛剛發生的友好/劇作家能力
    revealedXRules: {},              // 已公開的 X 規則 {X1?:true, X2?:true}
  };
  syncOffBoard();
  applyPassiveLoopStart();
}

// ex 槽
function incrementEx(n) {
  state.ex = (state.ex || 0) + n;
  state.exIncreasedThisLoop = true;
  // 等級 4：玩家立刻輸掉所有輪迴
  if (state.ex >= 4 && state.phase !== 'guess' && state.phase !== 'gameover') {
    while (state.pastLoops.length < state.script.loops) {
      state.pastLoops.push({ loop: state.pastLoops.length + 1, result: 'lose', reason: 'ex 槽 ≥ 4 強制結束' });
    }
    state.phase = 'guess';
    state.guesses = {};
  }
}

// 取得本輪實際生效的 Y 規則（瘋狂的真相 → 看當前 ex 槽即時切換）
function getActiveYRule() {
  const isMadTruth = state.script.X1 === '瘋狂的真相' || state.script.X2 === '瘋狂的真相';
  if (isMadTruth && state.ex >= 2 && state.script.Y2) {
    return state.script.Y2;
  }
  return state.script.Y1;
}

// Y 規則失敗條件（在輪結束時檢查）
function checkYRuleFailure() {
  const yName = getActiveYRule();
  if (!yName || !RULE_Y_DEFS[yName]) return;
  let triggered = false;
  let reason = '';
  switch (yName) {
    case '外神合唱曲': {
      const aliveWithCons = state.characters.filter(c => !c.dead && c.conspiracy >= 1);
      if (aliveWithCons.length >= 5) { triggered = true; reason = '5 名以上生存角色身上各有 ≥1 枚密謀'; }
      break;
    }
    case '達貢的福音書': {
      const shrine = state.locations.find(l => l.id === 1);
      if (shrine.conspiracy >= state.ex) { triggered = true; reason = '神社密謀 ≥ ex 槽值'; }
      break;
    }
    case '黃衣之王': {
      if (state.exIncreasedThisLoop) { triggered = true; reason = '本輪 ex 槽曾增加'; }
      break;
    }
    case '巨大定時炸彈Y': {
      const witch = state.characters.find(c => c.role === '魔女');
      if (witch) {
        const initLoc = CHAR_DEFS[witch.name].initPos;
        const loc = state.locations.find(l => l.id === initLoc);
        if (loc.conspiracy >= 2) { triggered = true; reason = '魔女初始區域密謀 ≥2'; }
      }
      break;
    }
    case '染血的儀式': {
      const dead = state.characters.filter(c => c.dead).length;
      if (dead >= state.ex) { triggered = true; reason = `屍體數 ≥ ex 槽值（${state.ex}）`; }
      break;
    }
  }
  if (triggered) loseLoop(`規則 ${yName} 失敗條件：${reason}`, 'fail');
}
function getCardEffectiveCount(card) {
  // ex 槽 ≥ 3：玩家獲得兩張禁止密謀（變成三張）
  if (card.id === 'p_no_co' && state.ex >= 3) return 3;
  return card.count;
}

// 黑貓 被動：每輪開始時神社 +1 密謀
function applyPassiveLoopStart() {
  if (state.characters.some(c => c.name === '黑貓' && !c.dead)) {
    const shrine = state.locations.find(l => l.id === 1);
    shrine.conspiracy += 1;
  }
}

// 同步離場狀態：神靈（出場輪）/ 轉校生（出場日）
function syncOffBoard() {
  for (const c of state.characters) {
    if (c.dead) { c.offBoard = false; continue; }
    let off = false;
    if (c.appearanceLoop && state.loop < c.appearanceLoop) off = true;
    if (c.appearanceDay && state.day < c.appearanceDay) off = true;
    c.offBoard = off;
  }
}

// 角色是否「在場上」（活著且已登場）
function isOnBoard(c) { return !c.dead && !c.offBoard; }

function resetLoop() {
  for (const c of state.characters) {
    const def = CHAR_DEFS[c.name];
    // 動態初始位置（手下）→ 由劇作家在 masterPickInit 階段設定
    c.position = def.dynamicInit ? null : def.initPos;
    c.dead = false;
    c.anxiety = 0;
    c.friendly = 0;
    c.conspiracy = 0;
  }
  state.locations.forEach(l => l.conspiracy = 0);
  state.day = 1;
  state.mPlays = [];
  state.pPlays = [];
  state.selectedCard = null;
  state.mUsedOnceCount = {};
  state.pUsedOnceCount = {};
  state.tindalosActive = false;
  state.loopResult = null;
  state.loopReason = '';
  state.pendingChoice = null;
  state.eventOutcome = null;
  state.loopAbilityUsed = {};
  state.dailyAbilityUsed = {};
  state.revealedRoles = {};
  state.friendlyLog = [];
  state.eventBlockedTargets = new Set();
  state.revealedEventTargets = {};
  state.movementUnlocked = new Set();
  state.armyDeathImmunity = false;
  state.guardedChars = new Set();
  state.masterAbilityLog = [];
  state.publicMasterAbilityLog = [];
  state.announcementLog = [];
  state.exAtLoopStart = state.ex;
  state.exIncreasedThisLoop = false;
  syncOffBoard();
  applyPassiveLoopStart();
  // 紀錄不重置（以便玩家回顧過去輪資訊）
}

// =========================================
// 工具
// =========================================
function getCard(side, id) {
  return (side === 'm' ? MASTERMIND_CARDS : PLAYER_CARDS).find(c => c.id === id);
}
function targetEqual(a, b) { return a.type === b.type && a.id === b.id; }
function getCharsInLocation(qid) {
  return state.characters.filter(c => c.position === qid && !c.dead && !c.offBoard);
}
function getCharByName(n) { return state.characters.find(c => c.name === n); }
function quadName(q) { return { 1:'神社', 2:'醫院', 3:'都會', 4:'學校' }[q]; }
function categoryLabel(c) { return { conspiracy:'密謀', friendly:'友好', anxiety:'不安', move:'移動' }[c]; }
function targetName(t) {
  if (t.type === 'loc') return state.locations.find(l => l.id === t.id).name + '(地點)';
  return state.characters.find(c => c.id === t.id).name;
}
function showPrivateStats() {
  // 已改為玩家也可見所有不安/密謀/友好數值
  return true;
}
function addAnnouncement(kind, text) {
  if (!state) return;
  state.announcementLog = state.announcementLog || [];
  const labelMap = {
    master: '劇作家能力',
    forced: '強制能力',
    friendly: '友好能力',
    event: '事件',
    system: '系統',
  };
  state.announcementLog.unshift({
    loop: state.loop,
    day: state.day,
    kind,
    label: labelMap[kind] || kind,
    text,
  });
  if (state.announcementLog.length > 12) state.announcementLog.length = 12;
}
function stripHiddenAbilityHints(text) {
  return String(text || '')
    // 規則/身分來源不應在公開公告中出現，例如「(流言四起)」或「（流言四起）」。
    .replace(/\s*[（(][^）)]*[）)]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}
function publicMasterAbilityText(effectLines) {
  const effects = (effectLines || []).map(stripHiddenAbilityHints).filter(Boolean);
  if (effects.length === 0) return '劇作家使用了能力。沒有公開可見的效果。';
  return `劇作家使用了能力，造成效果：${effects.join('、')}`;
}
function publicForcedAbilityText(effectLines) {
  const visible = [];
  for (const raw of (effectLines || [])) {
    const line = stripHiddenAbilityHints(raw);
    if (!line) continue;
    // 不公開「誰的強制能力觸發」或「因此公開了什麼身分」。只保留可觀察結果。
    if (line.includes('強制能力觸發')) continue;
    if (line.includes('身分為')) continue;
    visible.push(line.replace(/^☠\s*/, ''));
  }
  if (visible.length === 0) return '回合結束時沒有公開可見的變化。';
  return `回合結束時：${visible.join('、')}`;
}
function toggleAnnouncement() {
  state.announcementCollapsed = !state.announcementCollapsed;
  render();
}
function hasTrait(char, trait) {
  const cdef = CHAR_DEFS[char.name];
  if (cdef && cdef.traits && cdef.traits.includes(trait)) return true;
  const rdef = ROLE_DEFS[char.role];
  if (rdef && rdef.traits && rdef.traits.includes(trait)) return true;
  return false;
}

// =========================================
// 移動
// =========================================
function combineMoves(subs) {
  if (subs.length === 0) return null;
  if (subs.length === 1) return subs[0];
  const set = subs.slice().sort().join(',');
  if (set === 'h,h') return 'h';
  if (set === 'v,v') return 'v';
  if (set === 'd,d') return 'd';
  if (set === 'h,v') return 'd';
  if (set === 'd,v') return 'v';
  if (set === 'd,h') return 'h';
  return null;
}
function applyMoveRaw(q, t) {
  const map = {
    v: { 1:4, 2:3, 3:2, 4:1 },
    h: { 1:2, 2:1, 3:4, 4:3 },
    d: { 1:3, 2:4, 3:1, 4:2 },
  };
  return map[t][q];
}
function applyMoveRestricted(char, moveType) {
  const newPos = applyMoveRaw(char.position, moveType);
  // 醫生友好3 持續效果：取消該角色的移動限制
  if (state.movementUnlocked && state.movementUnlocked.has(char.name)) {
    return { newPos, blocked: false };
  }
  const def = CHAR_DEFS[char.name];
  if (def && def.forbidden && def.forbidden.includes(newPos)) {
    return { newPos: char.position, blocked: true, attempted: newPos };
  }
  return { newPos, blocked: false };
}

// =========================================
// 死亡 / 勝負
// =========================================
function killCharacter(c, log) {
  if (c.dead) return false;
  // 護衛 優先於不死：消耗護衛代替死亡
  if (state.guardedChars && state.guardedChars.has(c.id)) {
    state.guardedChars.delete(c.id);
    log.push(`${c.name} 的護衛指示物消耗，免於死亡`);
    return false;
  }
  if (hasTrait(c, '不死')) {
    return false; // 靜默失敗，不對玩家提示
  }
  c.dead = true;
  log.push(`☠ ${c.name} 死亡`);
  if (c.role === '關鍵人物') {
    loseLoop(`關鍵人物 ${c.name} 死亡`);
  }
  // 深淵之都的私語：偏執狂 死亡 → 玩家失敗
  if (c.role === '偏執狂' && (state.script.X1 === '深淵之都的私語' || state.script.X2 === '深淵之都的私語')) {
    loseLoop(`深淵之都的私語：偏執狂 ${c.name} 死亡`);
  }
  if (c.role === '深潛者') {
    state.revealedRoles = state.revealedRoles || {};
    state.revealedRoles[c.id] = c.role;
    log.push(`${c.name} 的身分為 ${c.role}`);
    incrementEx(1);
  }
  return true;
}
function loseLoop(reason, kind = 'fail') {
  // kind: 'fail' (玩家失敗) 或 'death' (玩家死亡)
  // 軍人 友好5：本輪「玩家死亡」敘述不會導致玩家輸
  if (kind === 'death' && state.armyDeathImmunity) {
    return; // 玩家死亡 被免疫
  }
  if (!state.loopResult) {
    state.loopResult = 'lose';
    state.loopReason = reason;
    state.loopLossKind = kind;
  }
}

// =========================================
// 結算每日出牌
// =========================================
function resolveCards() {
  const allPlays = [
    ...state.mPlays.map(p => ({ ...p, side:'m', card:getCard('m', p.cardId) })),
    ...state.pPlays.map(p => ({ ...p, side:'p', card:getCard('p', p.cardId) })),
  ];
  const groups = {};
  for (const p of allPlays) {
    const k = `${p.target.type}_${p.target.id}`;
    if (!groups[k]) groups[k] = { target: p.target, plays: [] };
    groups[k].plays.push(p);
  }

  // 過濾：對死亡角色的牌一律無效
  for (const k in groups) {
    const g = groups[k];
    if (g.target.type === 'char') {
      const c = state.characters.find(c => c.id === g.target.id);
      if (c && c.dead) {
        g.allDead = true;
      }
    }
  }

  const dayLog = { day: state.day, loop: state.loop, kind: 'cards', groups: [] };

  for (const k in groups) {
    const g = groups[k];
    const isLoc = g.target.type === 'loc';
    const charObj = !isLoc ? state.characters.find(c => c.id === g.target.id) : null;
    const locObj  = isLoc  ? state.locations.find(l => l.id === g.target.id) : null;

    if (g.allDead) {
      dayLog.groups.push({ target: g.target, plays: g.plays, cancelled: g.plays.map((_,i)=>i), effects: ['角色已死亡，所有牌無效'] });
      continue;
    }

    // 時間旅者：劇作家不能對其用禁止友好（自動失效）
    let extraCancel = new Set();
    if (charObj && charObj.role === '時間旅者') {
      g.plays.forEach((p, i) => {
        if (p.side === 'm' && p.card.type === 'forbid' && p.card.forbids === 'friendly') {
          extraCancel.add(i);
        }
      });
    }

    const triggered = { conspiracy:false, friendly:false, anxiety:false, move:false };
    for (let i = 0; i < g.plays.length; i++) {
      const p = g.plays[i];
      if (extraCancel.has(i)) continue;
      if (p.card.type === 'forbid') {
        const f = p.card.forbids;
        const hasMatch = g.plays.some((q, j) => !extraCancel.has(j) && (f==='move' ? q.card.type==='move' : q.card.type === f));
        if (hasMatch) triggered[f] = true;
      }
    }
    const cancelled = new Set(extraCancel);
    g.plays.forEach((p, idx) => {
      if (cancelled.has(idx)) return;
      if (p.card.type === 'forbid') {
        if (!triggered[p.card.forbids]) cancelled.add(idx);
      } else {
        const cat = p.card.type === 'move' ? 'move' : p.card.type;
        if (triggered[cat]) cancelled.add(idx);
      }
    });
    const effects = [];
    if (extraCancel.size > 0) effects.push('時間旅者：禁止友好自動失效');
    const active = g.plays.filter((_, i) => !cancelled.has(i));

    if (isLoc) {
      for (const p of active) {
        if (p.card.type === 'conspiracy') {
          locObj.conspiracy += p.card.delta;
          effects.push(`密謀 +${p.card.delta}`);
        } else if (p.card.type === 'forbid' && p.card.forbids === 'conspiracy') {
          effects.push(`禁止密謀 觸發`);
        } else {
          effects.push(`${p.card.name} 對地點無效`);
        }
      }
    } else {
      const moveSubs = active.filter(p => p.card.type === 'move').map(p => p.card.subtype);
      if (moveSubs.length > 0) {
        const r = combineMoves(moveSubs);
        if (r) {
          const oldQ = charObj.position;
          const res = applyMoveRestricted(charObj, r);
          charObj.position = res.newPos;
          if (res.blocked) {
            effects.push(`移動 ${moveSubs.join('+')}=${r}：${quadName(oldQ)}→${quadName(res.attempted)} 受限制 (停留)`);
          } else {
            effects.push(`移動 ${moveSubs.join('+')}=${r}：${quadName(oldQ)} → ${quadName(charObj.position)}`);
          }
        }
      }
      for (const p of active) {
        if (p.card.type === 'anxiety') {
          charObj.anxiety = Math.max(0, charObj.anxiety + p.card.delta);
          effects.push(`不安 ${p.card.delta>0?'+':''}${p.card.delta}`);
        }
      }
      for (const p of active) {
        if (p.card.type === 'friendly') {
          // 絕對無視友好 / 無視友好 只在觸發友好「能力」時生效，不擋友好牌的數值
          const b = charObj.friendly;
          charObj.friendly = Math.max(0, charObj.friendly + p.card.delta);
          effects.push(`友好 +${p.card.delta}：${b}→${charObj.friendly}`);
        }
      }
      for (const p of active) {
        if (p.card.type === 'conspiracy') {
          charObj.conspiracy += p.card.delta;
          effects.push(`角色密謀 +${p.card.delta}`);
        }
      }
      for (const cat of ['conspiracy','friendly','anxiety','move']) {
        if (triggered[cat]) effects.push(`禁止${categoryLabel(cat)} 觸發`);
      }
    }
    dayLog.groups.push({ target: g.target, plays: g.plays, cancelled: [...cancelled], effects });
  }
  state.log.unshift(dayLog);

  for (const p of state.mPlays) {
    const c = getCard('m', p.cardId);
    if (c.once) state.mUsedOnceCount[c.id] = (state.mUsedOnceCount[c.id] || 0) + 1;
  }
  for (const p of state.pPlays) {
    const c = getCard('p', p.cardId);
    if (c.once) state.pUsedOnceCount[c.id] = (state.pUsedOnceCount[c.id] || 0) + 1;
  }
}

// =========================================
// 事件處理
// =========================================
function todayEvent() {
  return state.script.events.find(e => e.day === state.day) || null;
}

function checkEventTrigger(event) {
  const c = getCharByName(event.target);
  if (!c || c.dead) return { triggered: false, reason: '當事人死亡或不存在' };
  if (c.offBoard) return { triggered: false, reason: '當事人尚未登場' };
  if (event.target === '黑貓') {
    return { triggered: false, reason: '黑貓 被動效果' };
  }
  if (state.eventBlockedTargets && state.eventBlockedTargets.has(event.target)) {
    return { triggered: false, reason: '當事人受能力影響，事件被封鎖' };
  }
  // 祭品：當事人事件中密謀視為不安處理
  const useConspiracyAsAnxiety = c.role === '祭品';
  const anxValue = useConspiracyAsAnxiety ? c.conspiracy : c.anxiety;
  if (event.event === '廷達羅斯之嗅') {
    return { triggered: c.conspiracy >= c.anxietyLimit, reason: `角色密謀 ${c.conspiracy} / 上限 ${c.anxietyLimit}` };
  }
  if (event.event === '送葬') {
    return { triggered: anxValue >= c.anxietyLimit - 1, reason: `不安 ${anxValue} / 上限-1=${c.anxietyLimit-1}` };
  }
  return { triggered: anxValue >= c.anxietyLimit, reason: `不安 ${anxValue} / 上限 ${c.anxietyLimit}` };
}

function executeEvent(event, log) {
  const character = getCharByName(event.target);

  // 廷達羅斯之嗅 已啟動 + 此事件不是廷達羅斯本身 → 玩家死亡（仍會繼續執行該事件效果）
  if (state.tindalosActive && event.event !== '廷達羅斯之嗅') {
    loseLoop(`廷達羅斯之嗅啟動後事件「${event.event}」觸發`, 'death');
  }

  switch (event.event) {
    case '邪氣汙染': {
      const shrine = state.locations.find(l => l.id === 1);
      shrine.conspiracy += 2;
      log.push(`神社密謀 +2`);
      return { needsChoice: false };
    }
    case '醫院事故': {
      const hosp = state.locations.find(l => l.id === 2);
      // 密謀≥1 → 醫院所有角色死亡；密謀≥2 → 玩家死亡（醫院仍全死）
      if (hosp.conspiracy >= 1) {
        state.characters.filter(c => c.position === 2 && !c.dead).forEach(c => killCharacter(c, log));
      }
      if (hosp.conspiracy >= 2) {
        loseLoop('醫院事故密謀≥2，玩家死亡', 'death');
      }
      return { needsChoice: false };
    }
    case '廷達羅斯之嗅': {
      state.tindalosActive = true;
      log.push(`廷達羅斯之嗅 已啟動：本輪剩餘事件若觸發即玩家輸`);
      return { needsChoice: false };
    }
    case '瘋狂殺人': {
      // 劇作家選擇與當事人同地一名角色（包含當事人）死亡
      const cands = state.characters.filter(c => c.position === character.position && !c.dead).map(c => c.id);
      state.pendingChoice = { type: 'mastermindKill', candidates: cands, eventLog: log };
      return { needsChoice: true };
    }
    case '不安擴散': {
      state.pendingChoice = { type: 'mastermindUnease', step: 1, eventLog: log };
      return { needsChoice: true };
    }
    case '送葬': {
      // 觸發判定為 anxiety >= limit - 1，自動標示，後續玩家挑一名死亡
      log.push(`送葬：玩家須選一名角色死亡`);
      state.pendingChoice = { type: 'playerKill', eventLog: log };
      return { needsChoice: true };
    }
    case '集體自殺': {
      if (character.conspiracy >= 1) {
        const killed = state.characters.filter(c => c.position === character.position && !c.dead && !c.offBoard);
        killed.forEach(c => killCharacter(c, log));
      } else {
        log.push('當事人無密謀，無事');
      }
      return { needsChoice: false };
    }
    case '失蹤': {
      // 劇作家選擇目的地（任意版圖，可同位置）
      state.pendingChoice = { type: 'missingDest', characterId: character.id, eventLog: log };
      return { needsChoice: true };
    }
    case '暴亂': {
      const school = state.locations.find(l => l.id === 4);
      if (school.conspiracy >= 1) {
        state.characters.filter(c => c.position === 4 && !c.dead && !c.offBoard).forEach(c => killCharacter(c, log));
      }
      const city = state.locations.find(l => l.id === 3);
      if (city.conspiracy >= 1) {
        state.characters.filter(c => c.position === 3 && !c.dead && !c.offBoard).forEach(c => killCharacter(c, log));
      }
      return { needsChoice: false };
    }
    case '滅絕之火': {
      // 本輪此前已觸發過的事件數（此事件本身的 log 條目尚未寫入，因此為前面的數量）
      const triggeredCount = state.log.filter(e => e.kind === 'event' && e.triggered && e.loop === state.loop).length;
      if (triggeredCount === 0) {
        state.characters.forEach(c => killCharacter(c, log));
        loseLoop('滅絕之火 為本輪第一個觸發事件，所有角色和玩家死亡', 'death');
      } else {
        log.push('非本輪第一個觸發事件，無事');
      }
      return { needsChoice: false };
    }
    case '發現': {
      incrementEx(1);
      log.push('ex 槽 +1');
      return { needsChoice: false };
    }
  }
  return { needsChoice: false };
}

function resolveMissingDest(charId, qid) {
  const c = state.characters.find(x => x.id === charId);
  const log = state.pendingChoice.eventLog;
  // 禁區檢查（除非 movementUnlocked 解除）
  const def = CHAR_DEFS[c.name];
  const isUnlocked = state.movementUnlocked && state.movementUnlocked.has(c.name);
  if (!isUnlocked && def && def.forbidden && def.forbidden.includes(qid)) {
    return; // 拒絕：UI 應已 disabled，這是防呆
  }
  c.position = qid;
  c.offBoard = false;
  const loc = state.locations.find(l => l.id === qid);
  loc.conspiracy += 1;
  log.push(`${c.name} 失蹤至 ${quadName(qid)}，${loc.name} 密謀 +1`);
  state.log[0].log = [...log];
  state.pendingChoice = null;
  render();
}

// =========================================
// 友好能力階段
// =========================================
// =========================================
// 劇作家任意能力階段
// =========================================
function startMasterAbilityPhase() {
  state.phase = 'masterAbility';
  state.masterAbilityLog = state.masterAbilityLog || [];
  if (!hasAnyActivatableMasterAbility()) {
    endMasterAbilityPhase();
    return;
  }
  render();
}

function hasAnyActivatableMasterAbility() {
  for (const c of state.characters) {
    if (c.dead || c.offBoard) continue;
    const abilities = getMasterAbilitiesFor(c);
    for (const a of abilities) {
      if (isMasterAbilityActivatable(c, a)) return true;
    }
  }
  // 規則綁定能力（如 流言四起）
  for (const ra of getRuleMasterAbilities()) {
    if (isRuleAbilityActivatable(ra)) return true;
  }
  return false;
}

function getRuleMasterAbilities() {
  const out = [];
  for (const slot of ['X1','X2']) {
    const name = state.script[slot];
    if (name && RULE_X_DEFS[name] && RULE_X_DEFS[name].masterAbility) {
      out.push({ slot, ruleName: name, ability: RULE_X_DEFS[name].masterAbility });
    }
  }
  return out;
}

function isRuleAbilityActivatable(ra) {
  const k = `rule_${ra.slot}_${ra.ability.id}`;
  if (ra.ability.freq === 'day' && state.dailyAbilityUsed[k]) return false;
  if (ra.ability.freq === 'loop' && state.loopAbilityUsed[k]) return false;
  if (ra.ability.check && !ra.ability.check(state)) return false;
  return true;
}

function tryUseRuleAbility(slot) {
  const ra = getRuleMasterAbilities().find(x => x.slot === slot);
  if (!ra || !isRuleAbilityActivatable(ra)) return;
  if (ra.ability.needsTarget) {
    state.pendingChoice = { type: 'ruleTarget', slot };
    render();
    return;
  }
  resolveRuleAbility(slot, null);
}

function resolveRuleAbility(slot, targetSpec) {
  const ra = getRuleMasterAbilities().find(x => x.slot === slot);
  if (!ra) return;
  const k = `rule_${ra.slot}_${ra.ability.id}`;
  if (ra.ability.freq === 'day') state.dailyAbilityUsed[k] = true;
  if (ra.ability.freq === 'loop') state.loopAbilityUsed[k] = true;
  let target = null;
  if (targetSpec) {
    const colonIdx = targetSpec.indexOf(':');
    const kind = targetSpec.slice(0, colonIdx);
    const idStr = targetSpec.slice(colonIdx + 1);
    if (kind === 'loc') target = { kind:'loc', id: Number(idStr) };
    else if (kind === 'char') target = state.characters.find(x => x.id === Number(idStr));
  }
  const beforeLen = state.masterAbilityLog.length;
  ra.ability.apply(state, null, target, state.masterAbilityLog);
  const effectLines = state.masterAbilityLog.splice(beforeLen);
  const msg = publicMasterAbilityText(effectLines);
  state.masterAbilityLog.push(msg);
  addAnnouncement('master', msg);
  state.pendingChoice = null;
  render();
}

function getRuleTargetCandidates(slot) {
  const ra = getRuleMasterAbilities().find(x => x.slot === slot);
  if (!ra) return [];
  if (ra.ability.needsTarget === 'anyLoc') {
    return state.locations.map(l => ({ kind:'loc', id:l.id, label:l.name }));
  }
  return [];
}

function getMasterAbilityKey(charId, ability) {
  return `m_${charId}_${ability.group || ability.id}`;
}

function isMasterAbilityUsed(charId, ability) {
  const k = getMasterAbilityKey(charId, ability);
  if (ability.freq === 'day') return !!state.dailyAbilityUsed[k];
  if (ability.freq === 'loop') return !!state.loopAbilityUsed[k];
  return false;
}

function markMasterAbilityUsed(charId, ability) {
  const k = getMasterAbilityKey(charId, ability);
  if (ability.freq === 'day') state.dailyAbilityUsed[k] = true;
  if (ability.freq === 'loop') state.loopAbilityUsed[k] = true;
}

function isMasterAbilityActivatable(c, ability) {
  if (c.dead) return false;
  if (isMasterAbilityUsed(c.id, ability)) return false;
  if (ability.check && !ability.check(state, c)) return false;
  return true;
}

function tryUseMasterAbility(charId, abilIdx) {
  const c = state.characters.find(x => x.id === charId);
  const ability = getMasterAbilitiesFor(c)[abilIdx];
  if (!isMasterAbilityActivatable(c, ability)) return;
  if (ability.needsTarget) {
    state.pendingChoice = { type: 'masterTarget', charId, abilIdx };
    render();
    return;
  }
  resolveMasterAbility(charId, abilIdx, null);
}

function resolveMasterAbility(charId, abilIdx, targetSpec) {
  const c = state.characters.find(x => x.id === charId);
  const ability = getMasterAbilitiesFor(c)[abilIdx];
  let target = null;
  if (targetSpec) {
    const colonIdx = targetSpec.indexOf(':');
    const kind = targetSpec.slice(0, colonIdx);
    const idStr = targetSpec.slice(colonIdx + 1);
    if (kind === 'char') target = state.characters.find(x => x.id === Number(idStr));
    else if (kind === 'loc') target = { kind:'loc', id: Number(idStr) };
  }
  markMasterAbilityUsed(charId, ability);
  const beforeLen = state.masterAbilityLog.length;
  ability.apply(state, c, target, state.masterAbilityLog);
  const effectLines = state.masterAbilityLog.splice(beforeLen);
  const msg = publicMasterAbilityText(effectLines);
  state.masterAbilityLog.push(msg);
  addAnnouncement('master', msg);
  state.pendingChoice = null;
  render();
}

function getMasterTargetCandidates(charId, abilIdx) {
  const c = state.characters.find(x => x.id === charId);
  const ability = getMasterAbilitiesFor(c)[abilIdx];
  if (ability.needsTarget === 'sameAreaCharNotSelf') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && !x.offBoard)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharNotSelfWithAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && !x.offBoard && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:`${x.name} (不安 ${x.anxiety})` }));
  }
  if (ability.needsTarget === 'sameAreaCharIncSelf') {
    return state.characters.filter(x => x.position===c.position && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name + (x.id===c.id?' (自己)':'') }));
  }
  if (ability.needsTarget === 'sameAreaCharOrLocPlace') {
    const out = state.characters.filter(x => x.position===c.position && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name + (x.id===c.id?' (自己)':'') + ' (角色密謀)' }));
    const loc = state.locations.find(l => l.id === c.position);
    out.push({ kind:'loc', id:loc.id, label:loc.name+' (地點密謀)' });
    return out;
  }
  if (ability.needsTarget === 'sameAreaCharNotSelfFriendly2') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.friendly>=2)
      .map(x => ({ kind:'char', id:x.id, label:`${x.name} (友好 ${x.friendly})` }));
  }
  if (ability.needsTarget === 'sameAreaCharNotSelfFriendly2WithAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.friendly>=2 && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:`${x.name} (友好 ${x.friendly}, 不安 ${x.anxiety})` }));
  }
  return [];
}

function endMasterAbilityPhase() {
  state.publicMasterAbilityLog = [...(state.masterAbilityLog || [])];
  if (state.masterAbilityLog && state.masterAbilityLog.length > 0) {
    state.log.unshift({ day: state.day, loop: state.loop, kind: 'masterAbility', log: [...state.masterAbilityLog] });
  }
  state.masterAbilityLog = [];
  // 即使中途已輸，本日仍照常進行
  startFriendlyPhase();
}

// =========================================
// 友好能力階段
// =========================================
function startFriendlyPhase() {
  state.phase = 'friendly';
  state.friendlyLog = [];
  render();
}

function getAbilityKey(charId, ability) {
  // 若 ability 有 group，多個能力共用一個 use 槽（例如偏執狂的不安/密謀只能擇一）
  return `${charId}_${ability.group || ability.id}`;
}

function isAbilityUsed(charId, ability) {
  const k = getAbilityKey(charId, ability);
  if (ability.freq === 'day') return !!state.dailyAbilityUsed[k];
  if (ability.freq === 'loop') return !!state.loopAbilityUsed[k];
  return false;
}

function markAbilityUsed(charId, ability) {
  const k = getAbilityKey(charId, ability);
  if (ability.freq === 'day') state.dailyAbilityUsed[k] = true;
  if (ability.freq === 'loop') state.loopAbilityUsed[k] = true;
}

function isAbilityActivatable(c, ability) {
  if (c.dead) return false;
  if (c.friendly < ability.threshold) return false;
  if (isAbilityUsed(c.id, ability)) return false;
  if (ability.check && !ability.check(state, c)) return false;
  return true;
}

function tryUseAbility(charId, abilIdx) {
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  if (!isAbilityActivatable(c, ability)) return;
  // 需選目標的能力（不論是否 customFlow）→ 走目標選擇流程；否則直接 resolveFriendlyAbility
  // customFlow 在 applyFriendlyAbility 才被觸發，先讓 resolveFriendlyAbility 檢查 無視友好/絕對無視友好
  if (ability.needsTarget) {
    state.pendingChoice = { type: 'friendlyTarget', charId, abilIdx };
    render();
    return;
  }
  resolveFriendlyAbility(charId, abilIdx, null);
}

// 情報商 友好5 流程
function informantDeclare(ruleName) {
  if (!state.pendingChoice || state.pendingChoice.type !== 'informantReveal') return;
  state.pendingChoice.declaredRule = ruleName;
  state.pendingChoice.step = 2;
  render();
}
function informantReveal(whichRule) { // 'X1' 或 'X2'
  if (!state.pendingChoice || state.pendingChoice.type !== 'informantReveal') return;
  const { charId, abilIdx, declaredRule } = state.pendingChoice;
  const ruleName = state.script[whichRule];
  // 規則名稱不可等於玩家聲明的；已公開的也不能再選
  if (ruleName === declaredRule) return;
  if ((state.revealedXRules || {})[whichRule]) return;
  state.revealedXRules = state.revealedXRules || {};
  state.revealedXRules[whichRule] = true;
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  markAbilityUsed(charId, ability);
  const msg = `情報商：劇作家公開規則 ${whichRule} 為「${ruleName}」`;
  state.friendlyLog.push(msg);
  addAnnouncement('friendly', msg);
  finishFriendlyAbility(c, ability);
}
function informantBackStep() {
  if (!state.pendingChoice || state.pendingChoice.type !== 'informantReveal') return;
  if (state.pendingChoice.step === 2) {
    state.pendingChoice.step = 1;
    state.pendingChoice.declaredRule = null;
    render();
  }
}

// 鑑別員 友好2 多步驟流程
function forensicSelectSource(srcId) {
  if (!state.pendingChoice || state.pendingChoice.type !== 'forensicMove') return;
  state.pendingChoice.sourceId = srcId;
  state.pendingChoice.step = 2;
  render();
}
function forensicSelectMarker(markerType) {
  if (!state.pendingChoice || state.pendingChoice.type !== 'forensicMove') return;
  state.pendingChoice.markerType = markerType;
  state.pendingChoice.step = 3;
  render();
}
function forensicBackStep() {
  if (!state.pendingChoice || state.pendingChoice.type !== 'forensicMove') return;
  if (state.pendingChoice.step === 2) {
    state.pendingChoice.step = 1;
    state.pendingChoice.sourceId = null;
  } else if (state.pendingChoice.step === 3) {
    state.pendingChoice.step = 2;
    state.pendingChoice.markerType = null;
  }
  render();
}
function forensicSelectDest(destId) {
  if (!state.pendingChoice || state.pendingChoice.type !== 'forensicMove') return;
  const { charId, abilIdx, sourceId, markerType } = state.pendingChoice;
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  const src = state.characters.find(x => x.id === sourceId);
  const dst = state.characters.find(x => x.id === destId);
  // 防護：確認來源仍有指示物
  if (!src || !dst || src.dead || dst.dead) { state.pendingChoice = null; render(); return; }
  if (src.position !== c.position || dst.position !== c.position) { state.pendingChoice = null; render(); return; }
  if ((src[markerType] || 0) < 1) { state.pendingChoice = null; render(); return; }
  src[markerType] = Math.max(0, src[markerType] - 1);
  dst[markerType] = (dst[markerType] || 0) + 1;
  markAbilityUsed(charId, ability);
  const labelMap = { anxiety:'不安', conspiracy:'角色密謀', friendly:'友好' };
  const msg = `${c.name}：${src.name} ${labelMap[markerType]} -1 → ${dst.name} +1`;
  state.friendlyLog.push(msg);
  addAnnouncement('friendly', msg);
  finishFriendlyAbility(c, ability);
}

function parseTargetSpec(targetSpec) {
  if (!targetSpec) return null;
  const colonIdx = targetSpec.indexOf(':');
  const kind = targetSpec.slice(0, colonIdx);
  const idStr = targetSpec.slice(colonIdx + 1);
  if (kind === 'char') return state.characters.find(x => x.id === Number(idStr));
  if (kind === 'loc') return { kind:'loc', id: Number(idStr) };
  if (kind === 'card') return { kind:'card', cardId: idStr };
  if (kind === 'event') return { kind:'event', day: Number(idStr) };
  return null;
}

function resolveFriendlyAbility(charId, abilIdx, targetSpec) {
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  // 所有友好能力嘗試都先交給劇作家裁定，避免玩家從流程判斷是否有「無視友好」。
  // normal：只能接受；ignore：可接受/拒絕；absolute：只能拒絕。
  let decisionMode = 'normal';
  if (hasTrait(c, '絕對無視友好')) decisionMode = 'absolute';
  else if (hasTrait(c, '無視友好') && !ability.bypassReject) decisionMode = 'ignore';
  state.pendingChoice = { type: 'masterRejectDecision', charId, abilIdx, targetSpec, decisionMode };
  render();
}

function applyFriendlyAbility(charId, abilIdx, targetSpec) {
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  // customFlow 在套用階段啟動（已通過 trait 檢查）
  if (ability.customFlow === 'forensicMove') {
    state.pendingChoice = { type: 'forensicMove', step: 1, charId, abilIdx, sourceId: null, markerType: null };
    render();
    return;
  }
  if (ability.customFlow === 'informantReveal') {
    state.pendingChoice = { type: 'informantReveal', step: 1, charId, abilIdx, declaredRule: null };
    render();
    return;
  }
  const target = parseTargetSpec(targetSpec);
  markAbilityUsed(charId, ability);
  const beforeLen = state.friendlyLog.length;
  ability.apply(state, c, target, state.friendlyLog);
  const effectLines = state.friendlyLog.slice(beforeLen);
  const effectText = effectLines.length ? ` → ${effectLines.join('、')}` : '';
  addAnnouncement('friendly', `${c.name} 發動友好能力：${ability.desc}${effectText}`);
  finishFriendlyAbility(c, ability);
}

function finishFriendlyAbility(c, ability) {
  // 巫師：玩家可選擇是否公開身分並使 ex+1
  if (c.role === '巫師') {
    state.pendingChoice = { type: 'wizardChoice', charId: c.id };
    render();
    return;
  }
  state.pendingChoice = null;
  render();
}

function wizardChoice(apply) {
  if (!state.pendingChoice || state.pendingChoice.type !== 'wizardChoice') return;
  const charId = state.pendingChoice.charId;
  const c = state.characters.find(x => x.id === charId);
  if (apply) {
    state.revealedRoles = state.revealedRoles || {};
    state.revealedRoles[c.id] = c.role;
    const msg = `${c.name} 的身分為 ${c.role}（玩家選擇公開，ex+1）`;
    state.friendlyLog.push(msg);
    addAnnouncement('friendly', msg);
    incrementEx(1);
  } else {
    const msg = `${c.name} 結算友好能力（玩家選擇不公開）`;
    state.friendlyLog.push(msg);
    addAnnouncement('friendly', msg);
  }
  state.pendingChoice = null;
  render();
}

function isTerminalPhase() {
  return state.phase === 'guess' || state.phase === 'gameover';
}

function masterAllowFriendly() {
  if (!state.pendingChoice || state.pendingChoice.type !== 'masterRejectDecision') return;
  if (state.pendingChoice.decisionMode === 'absolute') return; // 絕對無視友好只能拒絕
  const { charId, abilIdx, targetSpec } = state.pendingChoice;
  applyFriendlyAbility(charId, abilIdx, targetSpec);
}

function masterDenyFriendly() {
  if (!state.pendingChoice || state.pendingChoice.type !== 'masterRejectDecision') return;
  if (state.pendingChoice.decisionMode === 'normal') return; // 一般角色只能接受
  const { charId, abilIdx } = state.pendingChoice;
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  markAbilityUsed(charId, ability);
  const msg = `${c.name} 嘗試發動友好能力，但遭劇作家拒絕而無效（ex+1）`;
  state.friendlyLog.push(msg);
  addAnnouncement('friendly', msg);
  incrementEx(1);
  state.pendingChoice = null;
  render();
}

function getFriendlyTargetCandidates(charId, abilIdx) {
  const c = state.characters.find(x => x.id === charId);
  const ability = CHAR_ABILITIES[c.name][abilIdx];
  // 回傳 [{kind, id, label}]
  if (ability.needsTarget === 'sameAreaChar') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaStudentAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && hasTrait(x,'學生') && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaDeadChar') {
    return state.characters.filter(x => x.position===c.position && x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name+'(死)' }));
  }
  if (ability.needsTarget === 'sameAreaCharWithAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharWithConspiracy') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.conspiracy>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharOrLocConspiracy') {
    const out = state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.conspiracy>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name+' (角色密謀)' }));
    const loc = state.locations.find(l => l.id === c.position);
    if (loc.conspiracy >= 1) out.push({ kind:'loc', id:loc.id, label:loc.name+' (地點密謀)' });
    return out;
  }
  if (ability.needsTarget === 'usedOncePlayerCard') {
    return Object.entries(state.pUsedOnceCount || {})
      .filter(([_, v]) => v >= 1)
      .map(([cardId]) => {
        const card = PLAYER_CARDS.find(cc => cc.id === cardId);
        return { kind:'card', id:cardId, label:card.name };
      });
  }
  if (ability.needsTarget === 'event') {
    return state.script.events
      .filter(e => !(state.revealedEventTargets && state.revealedEventTargets[e.day]))
      .map(e => ({ kind:'event', id:e.day, label:`第 ${e.day} 天 ${e.event}` }));
  }
  if (ability.needsTarget === 'sameAreaStudentNotSelf') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && hasTrait(x,'學生'))
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaStudentNotSelfWithAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && hasTrait(x,'學生') && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'anyOtherChar') {
    return state.characters.filter(x => x.id!==c.id && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'anyDeadChar') {
    return state.characters.filter(x => x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name+'(屍)' }));
  }
  if (ability.needsTarget === 'triggeredEvent') {
    const triggeredDays = new Set();
    for (const entry of state.log) {
      // 只取本輪觸發的事件（刑警友好4 限本輪）
      if (entry.kind === 'event' && entry.triggered && entry.loop === state.loop) triggeredDays.add(entry.day);
    }
    return state.script.events
      .filter(e => triggeredDays.has(e.day) && !(state.revealedEventTargets && state.revealedEventTargets[e.day]))
      .map(e => ({ kind:'event', id:e.day, label:`第 ${e.day} 天 ${e.event}` }));
  }
  if (ability.needsTarget === 'sameAreaCharOverAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.anxiety>=x.anxietyLimit)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharNotSelf') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharNotSelfWithAnxiety') {
    return state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead && x.anxiety>=1)
      .map(x => ({ kind:'char', id:x.id, label:x.name }));
  }
  if (ability.needsTarget === 'sameAreaCharOrLocPlace') {
    // 任意（含自己）+ 該位置
    const out = state.characters.filter(x => x.position===c.position && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name + (x.id===c.id?' (自己)':'') + ' (角色密謀)' }));
    const loc = state.locations.find(l => l.id === c.position);
    out.push({ kind:'loc', id:loc.id, label:loc.name+' (地點密謀)' });
    return out;
  }
  if (ability.needsTarget === 'sameAreaCharOrLocPlaceNotSelf') {
    // 排除自己 + 該位置
    const out = state.characters.filter(x => x.position===c.position && x.id!==c.id && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name + ' (角色密謀)' }));
    const loc = state.locations.find(l => l.id === c.position);
    out.push({ kind:'loc', id:loc.id, label:loc.name+' (地點密謀)' });
    return out;
  }
  if (ability.needsTarget === 'sameAreaCharIncSelf') {
    return state.characters.filter(x => x.position===c.position && !x.dead)
      .map(x => ({ kind:'char', id:x.id, label:x.name + (x.id===c.id?' (自己)':'') }));
  }
  return [];
}

function cancelFriendlyTarget() {
  state.pendingChoice = null;
  render();
}

function endFriendlyPhase() {
  // 將友好紀錄寫入歷程
  if (state.friendlyLog.length > 0) {
    state.log.unshift({ day: state.day, loop: state.loop, kind: 'friendly', log: [...state.friendlyLog] });
  }
  startEventPhase();
}

function startEventPhase() {
  // 先進入 event phase；若今天沒有事件，finishDay() 仍會被視為合法的事件階段推進。
  state.phase = 'event';
  const event = todayEvent();
  if (!event) {
    finishDay();
    return;
  }
  const trig = checkEventTrigger(event);
  const log = [];
  state.eventOutcome = {
    event: event.event,
    target: event.target,
    triggered: trig.triggered,
    reason: trig.reason,
    log,
  };
  if (trig.triggered) {
    const r = executeEvent(event, log);
    state.phase = 'event';
    if (r.needsChoice) {
      // 等待選擇
    }
  } else {
    // 觸發判定值與上限為機密，不寫入公開紀錄
    state.phase = 'event';
  }
  // 紀錄
  state.log.unshift({ day: state.day, loop: state.loop, kind: 'event', event: event.event, target: event.target, triggered: trig.triggered, log: [...log] });
  render();
}

// 完成事件選擇
function resolveMastermindKill(targetId) {
  const c = state.characters.find(c => c.id === targetId);
  const log = state.pendingChoice.eventLog;
  // 不公開劇作家選了誰；若是不死則靜默失敗
  killCharacter(c, log);
  state.log[0].log = [...log];
  state.pendingChoice = null;
  render();
}

function resolveUnease(step, targetId) {
  const c = state.characters.find(c => c.id === targetId);
  const log = state.pendingChoice.eventLog;
  if (state.pendingChoice.step === 1) {
    c.anxiety += 1;
    log.push(`${c.name} 不安 +1`);
    state.pendingChoice.step = 2;
    state.log[0].log = [...log];
    render();
  } else {
    c.conspiracy += 1;
    log.push(`${c.name} 角色密謀 +1`);
    state.log[0].log = [...log];
    state.pendingChoice = null;
    render();
  }
}

function resolvePlayerKill(targetId) {
  const c = state.characters.find(c => c.id === targetId);
  const log = state.pendingChoice.eventLog;
  log.push(`玩家選擇 ${c.name} 死亡`);
  killCharacter(c, log);
  state.log[0].log = [...log];
  state.pendingChoice = null;
  render();
}

// =========================================
// 結束本日 / 本輪 / 全部
// =========================================
function finishDay() {
  // 防止線上雙擊、舊畫面殘留按鈕、或重複封包導致同一天被結算兩次。
  if (state.phase !== 'event') return;
  const dayEndLog = [];
  // 目擊者：回合結束時若不安≥4 則死亡並 ex+1
  for (const c of state.characters) {
    if (c.role === '目擊者' && !c.dead && !c.offBoard && c.anxiety >= 4) {
      killCharacter(c, dayEndLog);
      incrementEx(1);
    }
  }
  // 殺人狂：所有殺人狂同時判定，避免「先殺先贏」順序問題
  const killerTargets = new Set();
  for (const c of state.characters) {
    if (c.role === '殺人狂' && !c.dead && !c.offBoard) {
      const sameArea = state.characters.filter(x => x.position === c.position && x.id !== c.id && !x.dead && !x.offBoard);
      if (sameArea.length === 1) killerTargets.add(sameArea[0].id);
    }
  }
  if (killerTargets.size > 0) {
    dayEndLog.push(`殺人狂 強制能力觸發`);
    for (const id of killerTargets) {
      const t = state.characters.find(x => x.id === id);
      if (t) killCharacter(t, dayEndLog);
    }
  }
  if (dayEndLog.length > 0) {
    state.log.unshift({ day: state.day, loop: state.loop, kind: 'dayend', log: dayEndLog });
    addAnnouncement('forced', publicForcedAbilityText(dayEndLog));
  }
  // ex≥4 強制結束保險
  if (isTerminalPhase()) { render(); return; }

  // 中途已輸 → 立刻結束本輪，跳過剩餘天數
  if (state.loopResult === 'lose') {
    state.pastLoops.push({ loop: state.loop, result: 'lose', reason: state.loopReason });
    state.phase = 'loopEnd';
    render();
    return;
  }
  if (state.day >= state.script.daysPerLoop) {
    // 最後一天 → 檢查時間旅者 / 巫師 輪結束條件
    for (const c of state.characters) {
      if (c.role === '時間旅者' && !c.dead && c.friendly < 3) {
        loseLoop(`時間旅者 ${c.name} 輪結束時友好不足3`);
      }
      if (c.role === '巫師' && c.dead) {
        loseLoop(`巫師 ${c.name} 輪結束時處於死亡狀態`);
      }
    }
    // Y 規則失敗條件
    checkYRuleFailure();
    if (!state.loopResult) {
      state.loopResult = 'win';
      state.loopReason = `完成本輪 ${state.script.daysPerLoop} 天且未觸發失敗條件`;
    }
    state.pastLoops.push({ loop: state.loop, result: state.loopResult, reason: state.loopReason });
    state.phase = 'loopEnd';
    render();
  } else {
    // 進入下一天
    state.day += 1;
    state.mPlays = [];
    state.pPlays = [];
    state.selectedCard = null;
    state.eventOutcome = null;
    state.dailyAbilityUsed = {}; // 每日能力重置
    state.friendlyLog = [];
    // 轉校生 出場日抵達時上場
    const arrivalLog = [];
    for (const c of state.characters) {
      if (c.offBoard && c.appearanceDay && state.day >= c.appearanceDay && !c.dead) {
        c.offBoard = false;
        c.position = CHAR_DEFS[c.name].initPos;
        arrivalLog.push(`${c.name} 登場（位置：${quadName(c.position)}）`);
      }
    }
    if (arrivalLog.length > 0) {
      state.log.unshift({ day: state.day, loop: state.loop, kind: 'arrival', log: arrivalLog });
    }
    syncOffBoard();
    state.phase = 'switch';
    state.nextRoleLabel = '劇作家';
    state.nextPhase = 'mastermind';
    render();
  }
}

function continueAfterLoop() {
  // 防止線上雙擊或重複封包使 loop 被推進兩次。
  if (state.phase !== 'loopEnd') return;
  // 玩家勝利條件1：任一輪 win 即遊戲勝
  const winLoop = state.pastLoops.find(l => l.result === 'win');
  if (winLoop) {
    state.overallResult = 'win';
    state.overallReason = `第 ${winLoop.loop} 輪存活完整 ${state.script.daysPerLoop} 天，玩家勝利`;
    state.phase = 'gameover';
    render();
    return;
  }
  if (state.loop >= state.script.loops) {
    // 所有輪皆失敗 → 進入猜身分階段（最後一搏）
    state.phase = 'guess';
    state.guesses = {};
    render();
    return;
  }
  state.loop += 1;
  resetLoop();
  // ex 槽 ≥ 1：輪開始選擇一名角色 +2 友好
  if (state.ex >= 1) {
    state.phase = 'exFriendly';
  } else {
    state.phase = 'switch';
    state.nextRoleLabel = '劇作家';
    state.nextPhase = 'mastermind';
  }
  render();
}

function applyExFriendly(charId) {
  const c = state.characters.find(x => x.id === charId);
  c.friendly += 2;
  state.log.unshift({ day: state.day, loop: state.loop, kind: 'exFriendly', log: [`(ex 槽 ≥1) ${c.name} 友好 +2`] });
  state.phase = 'switch';
  state.nextRoleLabel = '劇作家';
  state.nextPhase = 'mastermind';
  render();
}

function submitGuess() {
  let correct = 0;
  const total = state.characters.length;
  const detail = [];
  for (const c of state.characters) {
    const guess = state.guesses[c.id];
    const isCorrect = guess === c.role;
    if (isCorrect) correct++;
    detail.push({ name: c.name, role: c.role, guess, correct: isCorrect });
  }
  state.guessDetail = detail;
  state.guessCorrect = correct;
  state.guessTotal = total;
  if (correct === total) {
    state.overallResult = 'win';
    state.overallReason = `猜對所有 ${total} 位角色身分，玩家勝利`;
  } else {
    state.overallResult = 'lose';
    state.overallReason = `僅猜對 ${correct}/${total} 位，劇作家勝利`;
  }
  state.phase = 'gameover';
  render();
}

function setGuess(charId, role) {
  state.guesses[charId] = role;
  render();
}

// =========================================
// 渲染
// =========================================
function render() {
  const app = document.getElementById('app');
  // 線上 lobby
  if (!state && Net.status !== 'idle') {
    app.innerHTML = renderLobby();
    return;
  }
  if (!state) {
    app.innerHTML = renderModeChoice();
    return;
  }
  // netWaiting：等待對手
  if (state.phase === 'netWaiting') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderNetWaiting();
    return;
  }
  // 自己不是當前階段的操作角色 → 顯示等待
  if (Net.enabled && state.phase !== 'switch') {
    const r = Net.expectedRole(state.phase);
    if (r && r !== Net.role) {
      app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderNetWaiting(r);
      return;
    }
  }
  // 'switch' 在網路模式下自動進入下一階段（因為各端只看自己的）
  if (state.phase === 'switch' && Net.enabled) {
    confirmHandoff();
    return;
  }
  if (state.phase === 'switch') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + `
      <div class="overlay">
        <div class="overlay-content">
          <h2>${state.nextRoleLabel} 回合</h2>
          <p>請將設備交給 ${state.nextRoleLabel}，準備好後點擊下方按鈕。</p>
          <button class="primary" style="width:auto; padding:10px 24px;" onclick="confirmHandoff()">我已準備好</button>
        </div>
      </div>`;
    return;
  }
  if (state.phase === 'gameover') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderGameOver();
    return;
  }
  if (state.phase === 'guess') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderGuessPhase();
    return;
  }
  if (state.phase === 'exFriendly') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderExFriendly();
    return;
  }
  if (state.phase === 'masterPickInit') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderMasterPickInit();
    return;
  }
  if (state.phase === 'loopEnd') {
    app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + renderLoopEnd();
    return;
  }
  let mainContent = `<div class="main-grid">${renderMap()}${renderSidePanel()}</div>`;
  let modal = pendingConfirm ? renderConfirmModal() : '';
  app.innerHTML = renderHeader() + renderRuleBanner() + renderCalendar() + mainContent + modal;
}

function renderModeChoice() {
  return `
    <div class="overlay">
      <div class="modal">
        <h2>慘劇 Tragedy</h2>
        <p>選擇遊玩模式：</p>
        <div class="modal-actions" style="flex-direction:column; gap:10px;">
          <button class="confirm" onclick="chooseOffline()">本機對戰（同台輪流）</button>
          <button class="confirm" onclick="chooseOnlineCreate()">建立線上房間（劇作家）</button>
          <button class="confirm" onclick="chooseOnlineJoin()">加入線上房間（玩家）</button>
        </div>
        <div style="font-size:11px; color:#888; margin-top:14px;">
          線上模式網頁：https://tragedy-looper.onrender.com。
        </div>
      </div>
    </div>`;
}

function renderLobby() {
  let html = `<div class="overlay"><div class="modal">
    <h2>線上房間</h2>`;
  if (Net.status === 'connecting') {
    html += `<p>連線中…</p>`;
  } else if (Net.status === 'waiting') {
    html += `<p>已建立房間。請告知對手以下房間代碼：</p>
      <div style="font-size:32px; font-weight:bold; color:#f0c674; text-align:center; padding:12px; background:#1a1a2e; border-radius:8px; letter-spacing:4px;">${Net.code}</div>
      <p style="font-size:12px; color:#a0a0c0; margin-top:8px;">你的角色：<b>劇作家</b>　等待玩家加入…</p>`;
  } else if (Net.status === 'paired') {
    html += `<p>已配對！房間：<b>${Net.code}</b>　角色：<b>${Net.role === 'mastermind' ? '劇作家' : '玩家'}</b></p>`;
    if (Net.role === 'mastermind') {
      html += `
        <p>劇作家請設定劇本，按下「開始遊戲」後玩家也會收到。</p>
        <textarea id="scriptInput">${SCRIPT_DEFAULT_TEXT}</textarea>
        <div id="setupErr" style="color:#ff8888; font-size:12px; margin-top:6px;"></div>
        <div class="modal-actions">
          <button class="confirm" onclick="startGame()">開始遊戲</button>
        </div>`;
    } else {
      html += `<p>等待劇作家設定劇本並開始遊戲…</p>`;
    }
  } else if (Net.status === 'err') {
    html += `<p style="color:#ff6666;">連線發生錯誤。</p>
      <button class="confirm" onclick="location.reload()">重新整理</button>`;
  }
  html += `</div></div>`;
  return html;
}

function renderNetWaiting(role) {
  const target = role || (Net.role === 'mastermind' ? 'player' : 'mastermind');
  const targetLabel = target === 'mastermind' ? '劇作家' : '玩家';
  return `
    <div class="overlay">
      <div class="overlay-content">
        <h2>等待 ${targetLabel} 操作</h2>
        <p>當前階段：${state.phase}</p>
        <p style="font-size:12px; color:#a0a0c0;">畫面會在對手完成後自動切換。</p>
      </div>
    </div>`;
}

function chooseOffline() {
  Net.enabled = false;
  // 顯示原本的 setup 畫面
  document.getElementById('app').innerHTML = renderOldSetup();
}

function chooseOnlineCreate() {
  Net.status = 'connecting';
  render();
  Net.connect('create').catch(e => { Net.status = 'err'; render(); });
}

function chooseOnlineJoin() {
  const code = (prompt('請輸入房間代碼：') || '').trim().toUpperCase();
  if (!code) return;
  Net.status = 'connecting';
  render();
  Net.connect('join', code).catch(e => { Net.status = 'err'; render(); });
}

function renderOldSetup() {
